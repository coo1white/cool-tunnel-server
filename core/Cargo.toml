# Workspace root for the Cool Tunnel Server Rust code.
#
# The shape of this workspace is deliberate — `ct-protocol` is the
# cross-platform shared crate that every Rust client (current macOS,
# future iOS / Android / Windows / Linux desktop) can depend on. The
# server is the canonical source of the wire format, and any new
# client just adds `ct-protocol` to its Cargo.toml to interoperate.
#
#  core/
#   ├── ct-protocol/        Pure-Rust shared types, no async, no I/O.
#   │                       What every client links against.
#   └── ct-server-core/     Server-only binary (CLI + daemon mode).
#                           Talks to MariaDB, sing-box clash API, metrics.

[workspace]
resolver = "2"
members = [
    "ct-protocol",
    "ct-server-core",
]

[workspace.package]
version       = "0.0.8"
edition       = "2021"
# 1.85 introduced edition2024 (needed by clap_lex 1.1); some sqlx
# transitives (icu_*) further require 1.86. The Docker build image
# must match — see docker/core/Dockerfile.
rust-version  = "1.86"
# Proprietary; the LICENSE file at the repo root is authoritative.
# We use license-file (not license) so we don't assert an SPDX id
# that misrepresents the terms.
license-file  = "../LICENSE"
repository    = "https://github.com/coo1white/cool-tunnel-server"
authors       = ["the Cool Tunnel Server contributors"]
publish       = false

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
pedantic     = { level = "warn",  priority = -1 }
unwrap_used  = "deny"
expect_used  = "deny"
panic        = "deny"
todo         = "deny"
unimplemented = "deny"

[profile.release]
opt-level     = 3
lto           = "fat"
codegen-units = 1
strip         = "symbols"
panic         = "abort"
