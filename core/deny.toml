# cargo-deny configuration.
#
# Run via the `audit` workflow on a weekly cron + on every PR that
# touches Cargo.toml / Cargo.lock. Locally: `cd core && cargo deny check`.
#
# We tune deny on top of cargo-audit to also catch:
#   - licence-incompatibility issues
#   - duplicate dependencies (which often hide diamond-bug regressions)
#   - dependencies pulled from registries we don't trust

[graph]
# Only check the actual targets we build for. Other-target advisories
# (musl-only Rust crates etc.) are noise.
targets = [
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-musl" },
]
all-features = false

[advisories]
# yanked crates fail the audit; everything else is whatever cargo-audit
# decides. Each entry on the ignore list MUST carry a comment
# explaining (a) why the project is not exposed to the advisory,
# (b) what we're waiting for upstream, (c) when to revisit.
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 — Marvin Attack: timing-sidechannel key
    # recovery in `rsa` 0.9.x. Reaches us as a TRANSITIVE
    # dependency of `sqlx-mysql 0.8.x`, where it's pulled in only
    # to support MySQL's `caching_sha2_password` authentication
    # plugin (the MySQL 8+ default).
    #
    # Why we're not exposed:
    #   - The project ships MariaDB 11 (per docker-compose.yml's
    #     `image: mariadb:11`), which uses `mysql_native_password`
    #     by default and never invokes the `rsa` codepath.
    #   - The MariaDB connection between panel and core is on the
    #     internal-only `ct-data` docker network; no untrusted
    #     attacker can position themselves to extract precise
    #     timing measurements against the auth handshake.
    #
    # Why no fix is shipped:
    #   - The `rsa` crate maintainers have stated upstream that no
    #     0.9 patch is forthcoming; the fix lives in the rewrite
    #     for the next major version.
    #   - sqlx is tracking the rewrite and will drop the rsa dep
    #     once an alternative lands (per their issue tracker).
    #
    # When to revisit:
    #   - Every quarterly audit cycle (set a calendar reminder).
    #   - On any sqlx release that drops or replaces `rsa`.
    #   - If MariaDB defaults change to a sha2-style auth plugin.
    "RUSTSEC-2023-0071",
]

[licenses]
# Allow the standard permissive set + GPL-3 (sing-box's licence — but
# we don't link sing-box, we run it as a separate process, so it
# never ends up in the Rust dep graph; this allow is here for
# completeness).
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",     # firefox-derived, weak-copyleft per-file
    "OpenSSL",      # rare; some old crates still
    "CC0-1.0",
    "0BSD",
]
# Anything not on `allow` is denied by default.
confidence-threshold = 0.93   # cargo-deny's default; bump if false-positives.

# Mark our own (publish=false) workspace crates as private so cargo-deny
# does not reject them as `unlicensed`. They carry
# `license-file = "../LICENSE"` (proprietary "All Rights Reserved") rather
# than an SPDX expression on the `license` field, and cargo-deny only
# recognises SPDX. The `publish = false` in `[workspace.package]` is the
# canonical declaration that these never reach a public registry; this
# stanza tells cargo-deny to honour it. Third-party deps still go through
# the full licence check.
[licenses.private]
ignore = true

[bans]
# Don't allow crates with multiple-version diamonds — an N-N+1 same-
# crate pair usually means an upgrade was incomplete.
multiple-versions = "warn"
wildcards = "warn"
# A few crates we never want pulled in. Add new entries as we discover
# them.
deny = [
    # `openssl-sys` would mean we accidentally pulled the C-OpenSSL
    # FFI in; we standardise on rustls.
    { name = "openssl", reason = "use rustls — this stack does not link OpenSSL FFI" },
    { name = "openssl-sys", reason = "see `openssl` ban" },
]

[sources]
# We only allow crates from the official crates.io registry. Git deps
# would be invisible to dependabot / renovate and break reproducible
# builds.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
