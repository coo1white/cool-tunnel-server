[toolchain]
# Pinned to 1.88 so CI and clients build the shared ct-protocol crate
# against the same toolchain. Keep this in lockstep with
# core/Cargo.toml::rust-version. Bumping higher is fine; lower may fail
# if a transitive dependency raises its MSRV.
channel = "1.88.0"
profile = "minimal"
components = ["clippy", "rustfmt"]
