# SPDX-License-Identifier: AGPL-3.0-only
# .gitleaks.toml — Cool Tunnel Server gitleaks overlay.
#
# `extend.useDefault = true` keeps every detector from the bundled
# gitleaks 8.x config active. This file ONLY adds a narrow allowlist
# for synthetic test fixtures the project ships intentionally.
#
# When adding entries here: prefer exact-string regexes over file-
# globbed allowlists so the rule keeps protecting the rest of the
# file from real secrets that happen to land near a fixture.

[extend]
useDefault = true

[allowlist]
description = "Synthetic test fixtures designed to exercise our own redaction / parser code."
regexes = [
  # operator/tests/bridge.test.ts: synthetic JWT used to assert that
  # bridge.ts::redact() emits the [jwt] marker for free-standing
  # JWT-shaped strings. This is the canonical HS256 example from
  # RFC 7519 / jwt.io documentation, signed with the literal key
  # "your-256-bit-secret" — not a real credential.
  '''eyJhbGciOiJIUzI1NiIs\.eyJzdWIiOiIxMjM0NSJ9\.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c''',
  # singbox-core/tests/render.test.ts (commit 20ed581b71e7): a
  # high-entropy base64url-shaped string used as a sing-box renderer
  # input. The renderer doesn't crypto-validate the value; it just
  # plumbs it into the rendered sing-box config. The current
  # working-tree value is a low-entropy placeholder (commit ed42858
  # onwards); the regex below pins the historical commit's value so
  # the gitleaks scan over the PR's diff range stops flagging it.
  '''EFOpHzZ8eSPQjGr5Tg2cFGSXgC7y5sN3yMpZJ_TT-Eo''',
]
