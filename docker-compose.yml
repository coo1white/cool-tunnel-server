# Cool Tunnel Server — full stack.
#
# Edit .env (copied from .env.example) before bringing this up.
# install.sh handles first-time bootstrap; this file is the source
# of truth for what is running in production.

services:
  # The Rust core builder. Not a long-running service — its image is
  # used as a build dep by `panel`. `docker compose build` brings it
  # up to date on each release.
  core-builder:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
    image: cool-tunnel-server-core:latest
    profiles: ["build-only"]      # never started by `compose up`

  sing-box:
    build:
      context: ./docker/sing-box
    image: cool-tunnel-server-singbox:latest
    container_name: ct-singbox
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"             # ACME HTTP-01 challenges (sing-box auto-binds when renewing)
      - "443:443"           # naive inbound — TLS, HTTP/2 CONNECT
      - "443:443/udp"       # HTTP/3 / QUIC
    volumes:
      # The panel renders config.json into a shared volume.
      - singbox_etc:/etc/sing-box
      # ACME state (cert + key per domain) lives under /data so it
      # survives image rebuilds.
      - singbox_data:/data
      # Shared admin socket so ct-server-core can hot-reload via the
      # clash API without TCP exposure.
      - singbox_run:/run/sing-box
    depends_on:
      panel:
        condition: service_started
    networks:
      - ct-net

  panel:
    build:
      context: .
      dockerfile: docker/panel/Dockerfile
      args:
        CT_CORE_IMAGE: cool-tunnel-server-core:latest
    image: cool-tunnel-server-panel:latest
    container_name: ct-panel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # ct-server-core daemon subscribes here for the
      # cool_tunnel:revocations channel.
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      # Where the SingBoxConfigGenerator writes the rendered file.
      # Mounted from singbox_etc so the sing-box container loads it.
      SINGBOX_CONFIG_PATH:    /etc/sing-box/config.json
      SINGBOX_CONFIG_TEMPLATE: /srv/sing-box/config.json.tpl
      # sing-box clash-API unix socket — read-write to the panel via
      # the shared singbox_run volume.
      SINGBOX_CLASH_SOCKET:   /run/sing-box/clash.sock
      # Where the daemon's own JSON-over-unix-socket lives.
      CT_CORE_SOCKET:         /run/cool-tunnel/core.sock
      CT_MANIFESTS_DIR:       /srv/manifests
    volumes:
      - ./panel:/var/www/html
      - ./manifests:/srv/manifests:ro
      - ./sing-box/config.json.tpl:/srv/sing-box/config.json.tpl:ro
      - panel_storage:/var/www/html/storage
      - singbox_etc:/etc/sing-box
      - singbox_run:/run/sing-box
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ct-net

  db:
    image: mariadb:11
    container_name: ct-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE:      ${DB_DATABASE}
      MARIADB_USER:          ${DB_USERNAME}
      MARIADB_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - ct-net

  redis:
    image: redis:7-alpine
    container_name: ct-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - ct-net

volumes:
  singbox_etc:
  singbox_data:
  singbox_run:
  panel_storage:
  db_data:
  redis_data:

networks:
  ct-net:
    driver: bridge
