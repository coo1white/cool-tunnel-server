# Cool Tunnel Server — full stack.
#
# Edit .env (copied from .env.example) before bringing this up.
# install.sh handles first-time bootstrap; this file is the source
# of truth for what is running in production.
#
# Architecture (one-line per layer):
#
#   :80  → caddy     ACME HTTP-01 challenges + http→https redirects.
#                    Stock Caddy, no plugins. Manages the cert for
#                    the operator's domain. Writes it to caddy_data,
#                    which sing-box reads.
#
#   :443 → sing-box  Multi-user NaiveProxy server. Reads cert+key
#                    from caddy_data (RO mount). Hot-reloads via the
#                    clash unix socket on cert renewal.
#
#         panel      Filament 3 admin (PHP). Shells out to
#                    ct-server-core (Rust) for sing-box config
#                    rendering, clash-API reload, metrics, etc.
#
#         db / redis MariaDB + Redis.

# v0.0.17 hardening defaults — applied to every long-running service
# via YAML anchor merge (`<<: *svc-hardening`). Three properties:
#   - cap_drop ALL: containers start with NO Linux capabilities.
#     Each service that genuinely needs a capability adds it back
#     explicitly via `cap_add` (caddy + sing-box need
#     NET_BIND_SERVICE for :80 / :443; nothing else needs anything).
#   - security_opt no-new-privileges: blocks setuid escalation
#     even if a binary inside the container has the bit set.
#   - logging json-file with 10 MB × 3 file rotation: prevents
#     unbounded `docker logs` growth on a chatty container from
#     pushing the host into disk-full. Without this the docker
#     daemon's default is "no rotation" which has bitten operators
#     repeatedly across the ecosystem.
x-svc-hardening: &svc-hardening
  cap_drop:
    - ALL
  security_opt:
    - "no-new-privileges:true"
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # The Rust core builder. Not a long-running service — its image is
  # used as a build dep by `panel`. `docker compose build` brings it
  # up to date on each release.
  core-builder:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
      # Explicitly target the `runtime` stage. The Dockerfile
      # also contains an `sqlx-prepare` stage AFTER `runtime`;
      # without this target, BuildKit would build the wrong
      # stage (the rust/cargo image) and tag it as
      # cool-tunnel-server-core:latest, which then has no
      # ct-server-core binary at /usr/local/bin/.
      target: runtime
    image: cool-tunnel-server-core:latest
    profiles: ["build-only"]      # never started by `compose up`

  # On-demand sqlx-cli runner. Brought up by `make sqlx-prepare`
  # to refresh core/.sqlx/ when migrations change column types.
  # Uses the `sqlx-prepare` stage of docker/core/Dockerfile,
  # which BuildKit caches alongside the `builder` stage — no
  # extra rust:1.86-alpine pull (Docker Hub rate-limit-safe).
  sqlx-prepare:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
      target: sqlx-prepare
    image: cool-tunnel-server-sqlx-prepare:latest
    profiles: ["sqlx"]            # never started by `compose up`
    environment:
      DATABASE_URL: "mysql://${DB_USERNAME}:${DB_PASSWORD}@db:3306/${DB_DATABASE}"
    volumes:
      - ./core:/build/core
    working_dir: /build/core
    networks:
      # ct-data: reach `db:3306` for query type-checking against
      #          the live schema.
      # ct-net:  internet for any rustup / crates.io fallback if
      #          the cached layers ever go stale. The image
      #          pre-installs everything it needs (Dockerfile
      #          stage `sqlx-prepare`) so this is belt-and-braces;
      #          if you tighten egress, ct-data alone suffices for
      #          normal prepare runs.
      - ct-data
      - ct-net
    depends_on:
      db:
        condition: service_healthy

  caddy:
    <<: *svc-hardening
    build:
      context: ./docker/caddy
    image: cool-tunnel-server-caddy:latest
    container_name: ct-caddy
    restart: unless-stopped
    # 1 GB-VPS sizing (v0.0.22). Caddy here is ACME-only (no proxy
    # traffic; no plugins) — measured idle 17 MiB, peak under
    # cert-renewal hot loop ~30 MiB. 64 MiB is generous and
    # deterministic — under-load behaviour is fail-fast OOM-kill,
    # never grow-and-crowd-the-host.
    mem_limit: 64m
    # Tiny Go runtime + ACME goroutines. 32 process slots is plenty
    # — a fork-bomb in the container can't escalate past it.
    pids_limit: 32
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"             # ACME HTTP-01 challenges + HTTP→HTTPS redirect
    volumes:
      # The panel renders Caddyfile into this shared volume.
      - caddy_etc:/etc/caddy
      # Caddy stores certs + ACME state under /data and needs RW
      # to write/renew them. sing-box and the panel mount this
      # volume RO — the panel-side ct-server-core reads cert
      # mtime here to detect renewals (see read_cert_mtime in
      # singbox/mod.rs); there is no flag-file written by Caddy.
      - caddy_data:/data
      # Caddy admin socket (loopback HTTP at :2019 — used by the
      # health probe inside the container).
    depends_on:
      panel:
        condition: service_started
    networks:
      - ct-net

  sing-box:
    <<: *svc-hardening
    build:
      context: ./docker/sing-box
    image: cool-tunnel-server-singbox:latest
    container_name: ct-singbox
    restart: unless-stopped
    # 1 GB-VPS sizing (v0.0.22). Measured idle 10 MiB, per-active-
    # user steady cost ~1-2 MiB on the Go runtime. 128 MiB caps
    # ~50-100 concurrent users on the documented minimum spec —
    # well above the "few users" the README promises, and the
    # OOM-kill on overflow is a clearer signal than slow grind.
    mem_limit: 128m
    # Each NaiveProxy session is a goroutine (cheap, not a pid).
    # 64 OS threads cover the Go runtime's M:N scheduling +
    # connection-handling threads.
    pids_limit: 64
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "443:443"           # naive inbound — TLS, HTTP/2 CONNECT
      # No UDP/443 — NaiveProxy is HTTP/2-only at the protocol level;
      # exposing UDP/443 with no listener produces a fingerprintable
      # connection-refused on QUIC scans. Add a UDP map only if a
      # real QUIC inbound (e.g. tuic) is configured in
      # sing-box/config.json.tpl.
    volumes:
      # Panel-rendered config.json lands here.
      - singbox_etc:/etc/sing-box
      # sing-box's own runtime data (cache.db, logs).
      - singbox_data:/data
      # Caddy's cert directory — mounted READ-ONLY. sing-box's TLS
      # config in config.json points at:
      #   /data/caddy/certificates/<ca>/<domain>/<domain>.crt
      # which is the standard Caddy auto-HTTPS layout.
      - caddy_data:/data/caddy:ro
    depends_on:
      caddy:
        condition: service_started
      panel:
        condition: service_started
    networks:
      ct-net:
      # H3 (2026-05-05 audit) — clash-API binds to `ct-singbox-mgmt`
      # (172.30.0.10) on this internal-only network. Caddy is NOT a
      # member of ct-clash, so a compromise of caddy can no longer
      # reach the management plane. The bind address is set in
      # core/ct-server-core/src/singbox/mod.rs::clash_listen() from
      # CT_CLASH_LISTEN, which the panel passes to the renderer.
      ct-clash:
        # Default 172.30.0.10. Override via CT_CLASH_SINGBOX_IP in
        # .env when the default subnet collides with an existing
        # docker network on the host (corporate VPN bridge,
        # Tailscale subnet route, k8s flannel, etc.). The address
        # MUST be inside CT_CLASH_SUBNET — see .env.example.
        ipv4_address: ${CT_CLASH_SINGBOX_IP:-172.30.0.10}
        aliases:
          - ct-singbox-mgmt
    # No 9090 in `ports:` — the clash API is reachable only on the
    # internal `ct-clash` network, never from the host. Audit-
    # enforced in .github/workflows/audit.yml — the guard greps this
    # service's `ports:` block for ":9090" and fails CI if found.

  panel:
    <<: *svc-hardening
    build:
      # Context is docker/panel/ so the Dockerfile's
      # `COPY opcache.ini …` etc. resolve to docker/panel/opcache.ini.
      # The Rust core binary comes in via the CT_CORE_IMAGE arg's
      # `FROM` reference, not the build context, so a narrow
      # context is fine.
      context: ./docker/panel
      args:
        CT_CORE_IMAGE: cool-tunnel-server-core:latest
    image: cool-tunnel-server-panel:latest
    container_name: ct-panel
    restart: unless-stopped
    # 1 GB-VPS sizing (v0.0.22). The panel is the largest service —
    # PHP-FPM master + 4 ondemand workers (v0.0.17) at ~30-50 MiB
    # each, plus nginx, supervisord, the queue worker, the
    # scheduler loop, and the ct-server-core daemon. Measured idle
    # is ~110 MiB; under load with all 4 FPM workers active and a
    # bulk-action job processing, peak measured ~250 MiB. 320 MiB
    # gives a 30 % headroom for opcache touching its 64 MiB cap.
    # Lower mem_limit below this and the queue worker OOM-kills
    # under bulk-delete fan-out, leaving the panel half-functional.
    mem_limit: 320m
    # FPM ondemand caps to PHP_FPM_MAX_CHILDREN (default 4 in
    # v0.0.17) + master + scheduler + queue + ct-core daemon +
    # nginx workers + supervisord + opcache cleanup threads. 256
    # process slots is generous and bounds any future fork-bomb
    # path.
    pids_limit: 256
    env_file:
      - .env
    ports:
      # Bind to the host's loopback only so an SSH-local-port-forward
      # (`ssh -L 9000:127.0.0.1:9000 host`) can reach the panel from
      # the operator's laptop. Public reachability of `/admin` is a
      # deferred v0.1 architectural item (R1-1 / R1-2 in the
      # 2026-05-04 audit; design seed at docs/design/sni-router-v0.1.md).
      # The 0.0.0.0 bind would expose the panel publicly with no TLS
      # and no auth; loopback bind keeps it SSH-gated.
      - "127.0.0.1:9000:9000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # ct-server-core daemon subscribes here for the
      # cool_tunnel:revocations channel.
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      # Where the SingBoxConfigGenerator writes the rendered file.
      SINGBOX_CONFIG_PATH:    /etc/sing-box/config.json
      SINGBOX_CONFIG_TEMPLATE: /srv/sing-box/config.json.tpl
      # Where the CaddyfileGenerator (panel) writes the rendered Caddyfile.
      CADDYFILE_PATH:         /etc/caddy/Caddyfile
      CADDYFILE_TEMPLATE:     /srv/caddy/Caddyfile.tpl
      # sing-box clash-API base URL. Reaches sing-box via the
      # internal `ct-clash` network's static IP (172.30.0.10), which
      # is the only interface sing-box binds clash-API on. The
      # `ct-singbox-mgmt` alias resolves to that IP via docker DNS
      # so the URL stays readable. (H3 in 2026-05-05 audit — caddy
      # is not on ct-clash, so it can no longer reach the management
      # plane even though the audit guard already blocked host-side
      # exposure.) Bearer token derived from ServerConfig per reload
      # — see core/ct-server-core/src/singbox/mod.rs::clash_secret.
      SINGBOX_CLASH_URL:      http://ct-singbox-mgmt:9090
      # Bind address ct-server-core writes into the rendered
      # sing-box config.json. Must match sing-box's static IP on
      # ct-clash (172.30.0.10). An operator with a different
      # network plan tunes both this and the `ipv4_address` on the
      # sing-box service together. Read by
      # core/ct-server-core/src/singbox/mod.rs::clash_listen().
      # Defaults to 172.30.0.10:9090. Override via
      # CT_CLASH_SINGBOX_IP in .env if the default subnet
      # collides with an existing docker network on the host.
      # The IP must match the `ipv4_address` set under
      # services.sing-box.networks.ct-clash above.
      CT_CLASH_LISTEN:        ${CT_CLASH_SINGBOX_IP:-172.30.0.10}:9090
      # Where the daemon's own JSON-over-unix-socket lives.
      CT_CORE_SOCKET:         /run/cool-tunnel/core.sock
      CT_MANIFESTS_DIR:       /srv/manifests
    volumes:
      - ./panel:/var/www/html
      # Mount the repo-root .env over the panel project's .env. The
      # bootstrap operator edits /opt/cool-tunnel-server/.env (one
      # file, one source of truth); Laravel inside the container
      # reads + writes /var/www/html/.env (its standard project
      # location, where `php artisan key:generate` appends APP_KEY).
      # Without this mount, the entrypoint's key:generate fails
      # with "Failed to open stream: No such file or directory".
      # RW is required because key:generate needs to append; mounted
      # as a single-file bind so other panel/ contents stay in
      # sync via the directory mount above.
      - ./.env:/var/www/html/.env
      - ./manifests:/srv/manifests:ro
      - ./sing-box/config.json.tpl:/srv/sing-box/config.json.tpl:ro
      - ./caddy/Caddyfile.tpl:/srv/caddy/Caddyfile.tpl:ro
      - panel_storage:/var/www/html/storage
      - singbox_etc:/etc/sing-box
      # Caddyfile is rendered into this volume so caddy picks it up.
      - caddy_etc:/etc/caddy
      # Panel-side ct-server-core reads cert mtime from here so the
      # render path picks up Caddy's renewals (read_cert_mtime in
      # singbox/mod.rs). RO — only Caddy writes this volume.
      - caddy_data:/data/caddy:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ct-net
      - ct-data
      # ct-clash: management-plane network shared only with sing-box.
      # The panel's ct-server-core daemon reaches sing-box's clash-API
      # over this network at 172.30.0.10:9090 (alias ct-singbox-mgmt).
      # Caddy is deliberately not a member.
      - ct-clash

  db:
    <<: *svc-hardening
    image: mariadb:11
    container_name: ct-db
    restart: unless-stopped
    # 1 GB-VPS sizing (v0.0.22). v0.0.17's `command:` block already
    # tuned MariaDB's internal buffers (innodb-buffer-pool-size=64M,
    # performance-schema=OFF, max-connections=20). Resident under
    # those caps is ~95-100 MiB. 192 MiB hard cap accommodates the
    # full buffer pool + max_connections × per-thread overhead with
    # ~2x headroom; OOM-kill on overflow is the tightest signal
    # available.
    mem_limit: 192m
    # MariaDB connection threads are pids in cgroup accounting.
    # max-connections=20 + background threads (purge, master,
    # InnoDB IO) + healthcheck.sh forks. 128 is generous; cap
    # protects against a runaway query spawning more.
    pids_limit: 128
    # MariaDB low-mem tuning (2026-05-05 low-mem-server pass).
    # Stock mariadb:11 reserves ~130 MiB on this box at idle —
    # mostly performance_schema (~80 MiB) plus the default 128 MB
    # InnoDB buffer pool. The flags below drop idle resident to
    # ~50-60 MiB while keeping query throughput ample for the
    # panel's read-mostly workload (proxy_accounts is in the
    # thousands, traffic_logs partitions by day). Tune higher on
    # boxes with more RAM via env (`DB_INNODB_BUFFER_POOL` etc.).
    command:
      - --innodb-buffer-pool-size=64M
      - --innodb-log-file-size=16M
      - --innodb-log-buffer-size=4M
      - --max-connections=20
      - --thread-cache-size=4
      - --table-open-cache=128
      - --performance-schema=OFF
      - --skip-name-resolve
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE:      ${DB_DATABASE}
      MARIADB_USER:          ${DB_USERNAME}
      MARIADB_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      # db is on the internal-only network — no internet access from
      # the database host. Only `panel` can reach it.
      - ct-data

  redis:
    <<: *svc-hardening
    image: redis:7-alpine
    container_name: ct-redis
    restart: unless-stopped
    # 1 GB-VPS sizing (v0.0.22). Redis here is the cache + pub/sub
    # bus + queue backend. Measured idle 9 MiB, peak under
    # bulk-revocation fan-out ~25 MiB. 64 MiB is generous; the OOM-
    # kill on overflow signals an unbounded data structure (which
    # we don't have today, but the cap protects against future
    # regressions).
    mem_limit: 64m
    # Single-threaded Redis core + a few I/O threads + bgsave fork
    # at AOF-rewrite time. 32 is plenty.
    pids_limit: 32
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      # Same as db: internal-only.
      - ct-data

volumes:
  caddy_etc:
  caddy_data:
  singbox_etc:
  singbox_data:
  panel_storage:
  db_data:
  redis_data:

networks:
  # ct-net: the "front" network. caddy + sing-box + panel sit here.
  # Has internet access (caddy needs ACME outbound, sing-box needs
  # the upstream proxy targets, panel needs composer install at
  # build time).
  ct-net:
    driver: bridge

  # ct-data: the "back" network. Only db + redis + panel. `internal:
  # true` cuts the internet entirely — a compromised db or redis
  # cannot phone home or pull tooling. Panel bridges the two
  # networks because it's the only thing that needs both DB access
  # and outside-world connectivity.
  ct-data:
    driver: bridge
    internal: true

  # ct-clash: management-plane network. Members: panel + sing-box.
  # Carries clash-API HTTP between the panel's ct-server-core daemon
  # and sing-box. `internal: true` so a compromised either side can
  # not pivot to the internet via this leg — caddy and any future
  # service stay off this network entirely. Static subnet so
  # core/ct-server-core/src/singbox/mod.rs::clash_listen() can pin
  # the bind address (172.30.0.10:9090) at config-render time.
  # H3 mitigation from 2026-05-05 audit. (Tuning the subnet
  # requires updating CT_CLASH_LISTEN in the panel env block above
  # and `ipv4_address` on sing-box's network membership.)
  ct-clash:
    driver: bridge
    internal: true
    ipam:
      config:
        # Default 172.30.0.0/24. Override via CT_CLASH_SUBNET in
        # .env when colliding with an existing docker network.
        # See .env.example "Network — clash management plane".
        - subnet: ${CT_CLASH_SUBNET:-172.30.0.0/24}
