# SPDX-License-Identifier: AGPL-3.0-only
#
# Cool Tunnel Server v0.5.3 runtime.
#
# Control plane:
#   admin-web  Next.js admin dashboard. Talks only to admin-api.
#   admin-api  Bun + Hono + Better Auth + SQLite. Owns auth,
#              users, proxy accounts, settings, status, audit, and
#              render/doctor action boundaries.
#
# Data plane:
#   caddy      Public :80/:443 front door and SNI router.
#   singbox    VLESS + Reality proxy runtime supervised by singbox-core.
#
# SQLite is the default storage. There is no PHP/Laravel/Filament,
# MariaDB, Redis, public signup, telemetry, or credential-bearing URL
# login flow in the current runtime.

x-svc-hardening: &svc-hardening
  cap_drop:
    - ALL
  security_opt:
    - "no-new-privileges:true"
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-utf8-env: &utf8-env
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

services:
  caddy:
    <<: *svc-hardening
    build:
      context: ./docker/caddy
      args:
        CT_CADDY_BUILDER_IMAGE: ${CT_CADDY_BUILDER_IMAGE:-caddy:2.11.3-builder}
        CT_CADDY_RUNTIME_IMAGE: ${CT_CADDY_RUNTIME_IMAGE:-caddy:2.11.3-alpine}
        CT_GOPROXY: ${CT_GOPROXY:-https://proxy.golang.org,direct}
        CT_GOSUMDB: ${CT_GOSUMDB:-sum.golang.org}
    image: cool-tunnel-server-caddy:latest
    container_name: ct-caddy
    restart: unless-stopped
    environment:
      <<: *utf8-env
    mem_limit: 192m
    pids_limit: 96
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_etc:/etc/caddy
      - caddy_data:/data
    depends_on:
      admin-web:
        condition: service_started
      singbox:
        condition: service_started
    networks:
      - ct-net

  singbox:
    <<: *svc-hardening
    build:
      context: .
      dockerfile: docker/singbox/Dockerfile
      args:
        CT_SINGBOX_CORE_IMAGE: cool-tunnel-server-singbox-core:latest
        CT_ALPINE_RUNTIME_IMAGE: ${CT_ALPINE_RUNTIME_IMAGE:-alpine:3.21}
        CT_ALPINE_REPOSITORY_BASE: ${CT_ALPINE_REPOSITORY_BASE:-}
    image: cool-tunnel-server-singbox:latest
    container_name: ct-singbox
    restart: unless-stopped
    environment:
      <<: *utf8-env
    mem_limit: 192m
    pids_limit: 96
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - singbox_config:/data/config:ro
    networks:
      - ct-net

  admin-api:
    <<: *svc-hardening
    build:
      context: .
      dockerfile: docker/admin-api/Dockerfile
      args:
        CT_SINGBOX_CORE_IMAGE: cool-tunnel-server-singbox-core:latest
    image: cool-tunnel-server-admin-api:latest
    container_name: ct-admin-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *utf8-env
      CT_ADMIN_HOST: 0.0.0.0
      CT_ADMIN_PORT: 9000
      CT_ADMIN_DB_PATH: /data/admin/admin.sqlite
      CT_ADMIN_SECURE_COOKIES: ${CT_ADMIN_SECURE_COOKIES:-true}
      BETTER_AUTH_URL: https://${PANEL_DOMAIN}
      CADDYFILE_PATH: /etc/caddy/Caddyfile
      CADDYFILE_TEMPLATE: /srv/caddy/Caddyfile.tpl
      SINGBOX_CONFIG_PATH: /data/config/singbox.json
      CT_MANIFESTS_DIR: /srv/manifests
      # Live container health + the restart action go through the allowlist-only
      # docker-proxy over HTTP — admin-api never holds the Docker socket.
      CT_DOCKER_API: http://ct-docker-proxy:2375
    volumes:
      - ./data/admin:/data/admin
      - caddy_etc:/etc/caddy
      - ./caddy/Caddyfile.tpl:/srv/caddy/Caddyfile.tpl:ro
      - ./manifests:/srv/manifests:ro
      - singbox_config:/data/config
    expose:
      - "9000"
    depends_on:
      docker-proxy:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - ct-net

  admin-web:
    <<: *svc-hardening
    build:
      context: .
      dockerfile: docker/admin-web/Dockerfile
    image: cool-tunnel-server-admin-web:latest
    container_name: ct-admin-web
    restart: unless-stopped
    environment:
      <<: *utf8-env
      NODE_ENV: production
      CT_API_INTERNAL_ORIGIN: http://admin-api:9000
    expose:
      - "3000"
    depends_on:
      admin-api:
        condition: service_started
    networks:
      - ct-net

  # Allowlist-only Docker socket forwarder. This is the ONLY service that
  # mounts the Docker socket. It runs the same image as admin-api but with a
  # minimal CMD (apps/api/src/docker-proxy.ts) that permits exactly
  # `GET /containers/<name>/json` and `POST /containers/<name>/restart` for the
  # known containers, refusing everything else. So a compromised admin-api
  # cannot reach the Engine API surface that grants host root.
  docker-proxy:
    <<: *svc-hardening
    image: cool-tunnel-server-admin-api:latest
    container_name: ct-docker-proxy
    restart: unless-stopped
    command: ["bun", "run", "apps/api/src/docker-proxy.ts"]
    environment:
      <<: *utf8-env
      CT_DOCKER_PROXY_PORT: "2375"
    mem_limit: 96m
    pids_limit: 32
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "2375"
    networks:
      - ct-net

  # Redis 8.x — the BullMQ backend for scheduled / queued admin jobs
  # (audit-log retention today; future admin notifications, etc.).
  # Bind only on the internal ct-net network; NOT exposed publicly.
  # No password — network isolation does the auth here. If you ever
  # expose Redis off-host, add `requirepass` + secret-rotate.
  redis:
    <<: *svc-hardening
    image: redis:8-alpine
    container_name: ct-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    environment:
      <<: *utf8-env
    mem_limit: 96m
    pids_limit: 32
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - ct-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  caddy_etc:
  caddy_data:
  singbox_config:
  redis_data:

networks:
  ct-net:
    driver: bridge
