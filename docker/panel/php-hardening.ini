; PHP runtime hardening drop-in. Loaded after opcache.ini by PHP-FPM
; via /usr/local/etc/php/conf.d (alphabetical, "p" > "o").
;
; expose_php = Off  — strip the `X-Powered-By: PHP/8.3.x` response
; header. Default On in upstream php:8.3-fpm-alpine. The panel sits
; behind nginx in this image, but nginx forwards the FPM-emitted
; header verbatim — the only place to suppress it is here. Without
; this, every panel response (subscription manifest, FakeSite cover,
; Filament admin, /up healthcheck) instantly classifies the deploy
; as a PHP application on what should look like a generic HTTPS
; endpoint.
expose_php = Off
