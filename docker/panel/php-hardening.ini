; PHP runtime hardening drop-in. Loaded after opcache.ini by
; FrankenPHP via /usr/local/etc/php/conf.d (alphabetical,
; "p" > "o").
;
; expose_php = Off  — strip the `X-Powered-By: PHP/8.4.x` response
; header. Default On in upstream PHP. FrankenPHP forwards the
; PHP-emitted header verbatim through Caddy; the only place to
; suppress it is here at the PHP layer. Without this, every panel
; response (subscription manifest, FakeSite cover, Filament admin,
; /up healthcheck) instantly classifies the deploy as a PHP
; application on what should look like a generic HTTPS endpoint.
;
; The Caddy Server header is stripped separately via the per-site
; `header -Server` directive in docker/panel/Caddyfile.
expose_php = Off
