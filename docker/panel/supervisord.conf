[supervisord]
nodaemon = true
logfile  = /dev/stdout
logfile_maxbytes = 0
pidfile  = /tmp/supervisord.pid
user     = root

[program:php-fpm]
command          = php-fpm --nodaemonize --fpm-config /usr/local/etc/php-fpm.d/zz-pool.conf
autostart        = true
autorestart      = true
stdout_logfile   = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile   = /dev/stderr
stderr_logfile_maxbytes = 0
priority         = 10

[program:nginx]
command          = nginx -g "daemon off;"
autostart        = true
autorestart      = true
stdout_logfile   = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile   = /dev/stderr
stderr_logfile_maxbytes = 0
priority         = 20

[program:queue]
command          = php /var/www/html/artisan queue:work --sleep=1 --tries=3 --max-time=3600
autostart        = true
autorestart      = true
stdout_logfile   = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile   = /dev/stderr
stderr_logfile_maxbytes = 0
priority         = 30

[program:scheduler]
# Laravel scheduler — kicks off traffic:rollup, quota:enforce, etc.
command          = /bin/sh -c 'while true; do php /var/www/html/artisan schedule:run --no-interaction; sleep 60; done'
autostart        = true
autorestart      = true
stdout_logfile   = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile   = /dev/stderr
stderr_logfile_maxbytes = 0
priority         = 40
