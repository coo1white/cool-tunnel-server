; opcache config — sized for a 1 vCPU / 1 GB VPS.
;
; PHP's INI parser officially uses `;` for comments. `#` is
; tolerated as a line-comment marker on most builds BUT only when
; the line contains no `=` — once a `#`-prefixed line has both `=`
; and a value-shaped tail, PHP treats it as `key = value` and
; tokenises the value (e.g. seeing `on` in `which on a small` as
; `BOOL_TRUE`), aborting startup with
;   "syntax error, unexpected BOOL_TRUE in opcache.ini on line N"
; First real-world Debian 13 deploy on PHP 8.3 (v0.0.25 hotfix)
; caught this; switched all comments to `;` for portability.
;
; Pre-2026-05-05 this reserved 128 MB shared opcode cache + 64 MB
; JIT buffer = 192 MB just to cache compiled PHP, which on a small
; box left no headroom for actual work. The numbers below cover
; Laravel 11 + Filament 3 + the project's app/ tree comfortably
; (measured: ~25 MB of compiled opcode at warm steady state) with
; ~2x headroom for future growth. Operators on bigger boxes can
; raise these via env / a custom conf.d/ drop-in without a rebuild.

opcache.enable=1
opcache.enable_cli=0

; Shared opcode cache. 64 MB is ~2x the warm working set; raising
; this past the working set yields no further hit-rate.
opcache.memory_consumption=64

; Interned strings buffer. Filament emits a lot of identical class
; names; 8 MB is enough for the panel's surface and saves the per-
; string allocation overhead. Was 16 MB; the extra 8 MB never filled.
opcache.interned_strings_buffer=8

; Cap on cached files. Default upstream is 10000; the panel ships
; ~3500 PHP files including vendor/. 5000 keeps the slot table
; small without evicting under realistic load.
opcache.max_accelerated_files=5000

; Validate file mtimes every 60 s instead of every request — saves
; stat() syscalls in the hot path, at the cost of a 60 s window
; between an artisan deploy and the new code being served. The
; entrypoint runs config:cache + view:cache after composer install
; so the cached state is the deployed state.
opcache.validate_timestamps=1
opcache.revalidate_freq=60

opcache.fast_shutdown=1

; JIT: tracing mode, 32 MB buffer. Cut from 64 MB — the panel's
; JIT-eligible functions are dominated by Laravel + Filament
; request-routing helpers; 32 MB holds the hot trace table with
; headroom. JIT itself is opt-in (the boolean above) so flipping
; this off entirely saves another ~5 MB resident if that matters.
opcache.jit=tracing
opcache.jit_buffer_size=32M
