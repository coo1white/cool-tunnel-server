worker_processes  auto;
error_log  /dev/stderr warn;
pid        /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 30;
    server_tokens off;

    # Mask subscription token in access log. `$request` is the full
    # request line — "GET /api/v1/subscription/<HMAC-token> HTTP/1.1"
    # — and persisting the token in plaintext on local disk extends
    # the credential's lifetime far past per-request scope. The
    # token is HMAC-bound to a specific proxy account; an operator
    # with shell access already has the DB, but rotating ops staff,
    # log shipping pipelines, and forgotten log archives are real
    # leakage paths. Replace the token with a literal `<masked>`
    # before the log line is written. (v0.0.14 anti-censorship.)
    #
    # Method-agnostic — covers GET (the documented client path),
    # HEAD (probe), POST/OPTIONS (CORS preflight or future API
    # extension). The pattern matches *any* request line beginning
    # with the subscription path, regardless of verb.
    map $request $request_logged {
        ~^[A-Z]+\s+/api/v1/subscription/[A-Za-z0-9_-]+   "$request_method /api/v1/subscription/<masked> HTTP/1.1";
        default                                          $request;
    }

    log_format combined_short '$remote_addr "$request_logged" $status $body_bytes_sent';
    access_log /dev/stdout combined_short;

    server {
        listen 9000;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Hardened: no hidden files, no .env, no vendor/.
        location ~ /\. { deny all; }
        location ~ ^/(vendor|storage|tests)/ { deny all; }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include       fastcgi_params;
            fastcgi_pass  127.0.0.1:9001;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # Don't claim HTTPS to PHP-FPM. The panel binds to
            # 127.0.0.1:9000 on the host and is reached via SSH-local-
            # forward (`ssh -L 9000:127.0.0.1:9000 host`) — that's
            # plain HTTP at this nginx, with SSH providing transport
            # security. Pre-v0.0.28 set `fastcgi_param HTTPS on;`
            # which made Symfony's Request::isSecure() return true,
            # causing Laravel to (a) generate https:// URLs in
            # redirects (302 → https://127.0.0.1:9000/admin/login,
            # which the browser then failed to TLS-handshake against
            # this same plain-HTTP listener — ERR_SSL_PROTOCOL_ERROR)
            # and (b) auto-set the `Secure` flag on session cookies
            # (which the browser then refused to send back over the
            # plain-HTTP tunnel, breaking login). Once the deferred
            # R1-1 / R1-2 SNI router lands and the panel sits behind
            # a real TLS-terminating proxy, that proxy should forward
            # `X-Forwarded-Proto: https` and TrustProxies (configured
            # in bootstrap/app.php for 127.0.0.1 and 172.16/12) will
            # pick it up — no need to spoof HTTPS at this layer.
            fastcgi_read_timeout 60;
        }
    }
}
