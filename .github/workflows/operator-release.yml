# SPDX-License-Identifier: AGPL-3.0-only
# ct-operator release pipeline.
#
# Builds the operator/ Bun CLI for every supported target, generates
# SHA256SUMS for the binaries, signs the manifest with the project's
# offline ed25519 signing key, and uploads everything to the GitHub
# release matching the tag the workflow was invoked on.
#
# Upload routing is by ref, not by event:
#   - ref is a tag (`refs/tags/v*`)  → attach to the existing release
#                                       at that tag. This is the path
#                                       for `release: published` AND
#                                       for `workflow_dispatch --ref
#                                       vX.Y.Z` (the recovery flow
#                                       used 2026-05-15 after GitHub-
#                                       hosted runner-queue starvation
#                                       failed the original three
#                                       release runs).
#   - ref is NOT a tag (e.g. main)   → publish a 14-day workflow
#                                       artifact instead. Useful when
#                                       smoke-testing pipeline changes
#                                       on a branch.
#
# Required secrets:
#   CT_OPERATOR_SIGNING_KEY  PEM-encoded ed25519 private key. Generated
#                            locally via `make operator-keygen` and
#                            pasted as a repo secret. Never commit it.
#
# The corresponding public key is *not* a secret — it's derived from the
# private key at build time and baked into each binary via --define.
# Operators verify update signatures with that embedded key.

name: ct-operator release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract pubkey from signing key
        id: pk
        env:
          SIGNING_KEY: ${{ secrets.CT_OPERATOR_SIGNING_KEY }}
        run: |
          if [[ -z "$SIGNING_KEY" ]]; then
            echo "::error::CT_OPERATOR_SIGNING_KEY secret is not set. Run \`make operator-keygen\` locally and add the private key as a repo secret."
            exit 1
          fi
          umask 077
          mkdir -p /tmp/keys
          printf '%s' "$SIGNING_KEY" > /tmp/keys/signing.key
          # The 32-byte raw ed25519 pubkey is the last 32 bytes of the
          # SPKI DER encoding. We base64-encode it for safe transport
          # through --define BUILD_PUBKEY=<json-string>.
          PUBKEY=$(openssl pkey -in /tmp/keys/signing.key -pubout -outform DER \
                   | tail -c 32 | base64 -w0)
          echo "pubkey=$PUBKEY" >> "$GITHUB_OUTPUT"
          echo "::notice::Embedding pubkey ${PUBKEY:0:12}…"

      - name: Build all targets
        working-directory: operator
        env:
          CT_OPERATOR_PUBKEY: ${{ steps.pk.outputs.pubkey }}
        run: |
          bun install --frozen-lockfile
          bun run build.ts all
          ls -lh bin/

      - name: Generate SHA256SUMS
        working-directory: operator/bin
        run: |
          sha256sum ct-operator-* > SHA256SUMS
          cat SHA256SUMS

      - name: Sign SHA256SUMS (ed25519 detached signature)
        working-directory: operator/bin
        run: |
          openssl pkeyutl -sign \
            -inkey /tmp/keys/signing.key \
            -rawin \
            -in SHA256SUMS \
            -out SHA256SUMS.sig
          # Wipe the private key before any later step might leak it.
          shred -u /tmp/keys/signing.key || rm -f /tmp/keys/signing.key
          ls -lh SHA256SUMS.sig

      - name: Self-check — verify the signature we just produced
        working-directory: operator/bin
        env:
          PUBKEY: ${{ steps.pk.outputs.pubkey }}
        run: |
          # Rebuild the pubkey as PEM so openssl can verify it.
          python3 - <<'PY' "$PUBKEY"
          import base64, sys
          raw = base64.b64decode(sys.argv[1])
          assert len(raw) == 32, f"expected 32 bytes, got {len(raw)}"
          spki = bytes.fromhex("302a300506032b6570032100") + raw
          import base64
          pem = "-----BEGIN PUBLIC KEY-----\n" \
                + base64.encodebytes(spki).decode().strip() \
                + "\n-----END PUBLIC KEY-----\n"
          open("/tmp/pubkey.pem", "w").write(pem)
          PY
          openssl pkeyutl -verify \
            -pubin -inkey /tmp/pubkey.pem \
            -rawin -in SHA256SUMS \
            -sigfile SHA256SUMS.sig

      - name: Upload artifacts to release (tag ref)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            operator/bin/ct-operator-*
            operator/bin/SHA256SUMS
            operator/bin/SHA256SUMS.sig

      - name: Upload artifacts (non-tag ref — workflow artifact)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ct-operator-release
          path: |
            operator/bin/ct-operator-*
            operator/bin/SHA256SUMS
            operator/bin/SHA256SUMS.sig
          retention-days: 14
