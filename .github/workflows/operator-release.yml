# SPDX-License-Identifier: AGPL-3.0-only
# ct-operator release pipeline.
#
# Builds the operator/ Bun CLI for every supported target, generates
# SHA256SUMS for the binaries, and uploads everything to the GitHub
# release matching the tag the workflow was invoked on.
#
# Upload routing is by ref, not by event:
#   - ref is a tag (`refs/tags/v*`)  → attach to the existing release
#                                       at that tag. This is the path
#                                       for `release: published` AND
#                                       for `workflow_dispatch --ref
#                                       vX.Y.Z` (the recovery flow
#                                       used 2026-05-15 after GitHub-
#                                       hosted runner-queue starvation
#                                       failed the original three
#                                       release runs).
#   - ref is NOT a tag (e.g. main)   → publish a 14-day workflow
#                                       artifact instead. Useful when
#                                       smoke-testing pipeline changes
#                                       on a branch.

name: ct-operator release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build all targets
        working-directory: operator
        run: |
          bun install --frozen-lockfile
          bun run build.ts all
          ls -lh bin/

      - name: Build prebuilt ct-server-core assets
        run: |
          mkdir -p operator/bin
          docker buildx build \
            --platform linux/amd64 \
            --target runtime \
            --provenance=false \
            --output type=local,dest=/tmp/ct-core-linux-x64 \
            -f docker/core/Dockerfile .
          cp /tmp/ct-core-linux-x64/usr/local/bin/ct-server-core operator/bin/ct-server-core-linux-x64
          docker buildx build \
            --platform linux/arm64 \
            --target runtime \
            --provenance=false \
            --output type=local,dest=/tmp/ct-core-linux-arm64 \
            -f docker/core/Dockerfile .
          cp /tmp/ct-core-linux-arm64/usr/local/bin/ct-server-core operator/bin/ct-server-core-linux-arm64
          chmod +x operator/bin/ct-server-core-linux-*
          ls -lh operator/bin/ct-server-core-linux-*

      - name: Build prebuilt singbox-core assets
        run: |
          mkdir -p operator/bin
          ./scripts/build_release_singbox_core_assets.sh
          cp release-assets/singbox-core-linux-* operator/bin/
          chmod +x operator/bin/singbox-core-linux-*
          ls -lh operator/bin/singbox-core-linux-*

      - name: Generate SHA256SUMS
        working-directory: operator/bin
        run: |
          sha256sum ct-operator-* ct-server-core-* singbox-core-* > SHA256SUMS.generated
          cp SHA256SUMS.generated SHA256SUMS
          cat SHA256SUMS

      - name: Merge existing release checksums
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p operator/bin/checksums
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern SHA256SUMS \
            --dir operator/bin/checksums \
            --clobber || true
          if [ -s operator/bin/checksums/SHA256SUMS ]; then
            cat operator/bin/SHA256SUMS.generated operator/bin/checksums/SHA256SUMS \
              | awk 'NF && !seen[$2]++' \
              > operator/bin/SHA256SUMS
          fi
          cat operator/bin/SHA256SUMS

      - name: Attest release binaries
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            operator/bin/ct-operator-*
            operator/bin/ct-server-core-*
            operator/bin/singbox-core-*

      - name: Upload artifacts to release (tag ref)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            operator/bin/ct-operator-*
            operator/bin/ct-server-core-*
            operator/bin/singbox-core-*
            operator/bin/SHA256SUMS

      - name: Upload artifacts (non-tag ref — workflow artifact)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ct-operator-release
          path: |
            operator/bin/ct-operator-*
            operator/bin/ct-server-core-*
            operator/bin/singbox-core-*
            operator/bin/SHA256SUMS
          retention-days: 14
