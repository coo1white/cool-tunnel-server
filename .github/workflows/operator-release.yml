# SPDX-License-Identifier: AGPL-3.0-only
# ct-operator release pipeline.
#
# Builds the operator/ Bun CLI for every supported target, generates
# SHA256SUMS for the binaries, and uploads everything to the GitHub
# release matching the tag the workflow was invoked on.
#
# Upload routing is by ref, not by event:
#   - ref is a tag (`refs/tags/v*`)  → attach to the existing release
#                                       at that tag. This is the path
#                                       for `release: published` AND
#                                       for `workflow_dispatch --ref
#                                       vX.Y.Z` (the recovery flow
#                                       used 2026-05-15 after GitHub-
#                                       hosted runner-queue starvation
#                                       failed the original three
#                                       release runs).
#   - ref is NOT a tag (e.g. main)   → publish a 14-day workflow
#                                       artifact instead. Useful when
#                                       smoke-testing pipeline changes
#                                       on a branch.

name: ct-operator release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all targets
        working-directory: operator
        run: |
          bun install --frozen-lockfile
          bun run build.ts all
          ls -lh bin/

      - name: Generate SHA256SUMS
        working-directory: operator/bin
        run: |
          sha256sum ct-operator-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts to release (tag ref)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            operator/bin/ct-operator-*
            operator/bin/SHA256SUMS

      - name: Upload artifacts (non-tag ref — workflow artifact)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ct-operator-release
          path: |
            operator/bin/ct-operator-*
            operator/bin/SHA256SUMS
          retention-days: 14
