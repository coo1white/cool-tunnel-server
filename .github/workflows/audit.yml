# SPDX-License-Identifier: AGPL-3.0-only
name: audit

on:
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'core/**'
      - 'operator/**'
      - 'singbox-core/**'
      - 'manifests/*.json'
      - 'docker/**/Dockerfile'
      - 'docker-compose.yml'
      - 'caddy/Caddyfile.tpl'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  cargo-audit:
    name: cargo audit (RustSec advisory DB)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
      - run: cargo install --locked cargo-audit
      - run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2023-0071

  cargo-deny:
    name: cargo deny (licenses + bans + sources)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
      - run: cargo install --locked cargo-deny --version "=0.18.9"
      - run: cargo deny check bans licenses sources

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  manifest-drift:
    name: manifest drift
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          workspace_v=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' core/Cargo.toml)
          operator_v=$(jq -r .version operator/package.json)
          for f in manifests/ct-server-core.upstream.json manifests/ct-protocol.upstream.json manifests/panel.upstream.json; do
              v=$(jq -r .version "$f")
              if [[ "$v" != "$workspace_v" ]]; then
                  echo "::error file=$f::manifest version $v does not match workspace $workspace_v"
                  exit 1
              fi
          done
          if [[ "$operator_v" != "$workspace_v" ]]; then
              echo "::error file=operator/package.json::operator version $operator_v does not match workspace $workspace_v"
              exit 1
          fi
          caddy_manifest=$(jq -r .version manifests/caddy.upstream.json)
          caddy_dockerfile=$(awk '
              /^ARG CT_CADDY_RUNTIME_IMAGE=caddy:/ {
                  sub(/^ARG CT_CADDY_RUNTIME_IMAGE=caddy:/,"")
                  sub(/-alpine.*$/,"")
                  print "v"$0
                  exit
              }
          ' docker/caddy/Dockerfile)
          if [[ "$caddy_manifest" != "$caddy_dockerfile" ]]; then
              echo "::error::caddy manifest=$caddy_manifest, Dockerfile=$caddy_dockerfile"
              exit 1
          fi
          echo "manifest-drift: clean"

  stale-docs:
    name: stale doc references
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          stale_patterns=(
            'php artisan'
            'Laravel|Filament|FrankenPHP'
            'CT_BOOTSTRAP_ADMIN_PASSWORD|ct:make-admin'
            'panel/config/cool-tunnel\.php|ct:version'
          )
          mapfile -t scan_files < <(find . -type f \
              \( -name '*.md' -o -name '*.rs' -o -name '*.ts' -o -name '*.json' -o -name '*.yml' -o -name '*.sh' -o -name 'Dockerfile*' \) \
              -not -path './.git/*' \
              -not -path './.runtime/*' \
              -not -path './target/*' \
              -not -path './.github/workflows/audit.yml' \
              -not -path '*/node_modules/*' \
              -not -path './operator/tests/*' \
              -not -path './operator/src/util/redact.ts' \
              -not -name 'CHANGELOG.md' \
              -not -name 'NOTICE' \
              -not -name 'AUDIT.md' \
              -not -name 'LTSC.md' \
              -not -name 'THIRD_PARTY_LICENSES.md' \
              -not -path './docs/architectural-decisions-2026.md')
          fail=0
          for pat in "${stale_patterns[@]}"; do
              if grep -EHn "$pat" "${scan_files[@]}" 2>/dev/null; then
                  echo "::error::stale reference matching /$pat/"
                  fail=1
              fi
          done
          exit "$fail"

  sqlx-offline-check:
    name: sqlx offline metadata up to date
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
      - run: |
          set -euo pipefail
          if [[ ! -d .sqlx ]]; then
              echo "::error::core/.sqlx/ is missing. Regenerate it from a trusted dev database and commit the result."
              exit 1
          fi
          cargo check --workspace --locked --message-format=human
        env:
          SQLX_OFFLINE: "true"

  dependency-review:
    name: dependency review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  anti-tracking-config:
    name: anti-tracking config smell-test
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          tpl=caddy/Caddyfile.tpl
          non_comments=$(grep -vE '^\s*#' "$tpl")
          if grep -Eq 'respond\s+"?(ok|alive|cool|tunnel|proxy)' <<< "$non_comments"; then
              echo "::error file=$tpl::Caddy should not expose recognizable probe responses"
              exit 1
          fi
          if grep -Eq 'Server:|X-Powered-By|X-CT-' <<< "$non_comments"; then
              echo "::error file=$tpl::fingerprinting header found"
              exit 1
          fi
          echo "anti-tracking-config: clean"
