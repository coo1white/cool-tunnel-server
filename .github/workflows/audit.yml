# Scheduled LTSC audit workflow.
#
# The first 30 audit cycles in v0.0.6 / v0.0.7 were run by hand.
# Cycles 31–50 (and beyond) run here, weekly, automatically. The
# pattern: cheap automated checks every Monday morning surface
# regressions before they accumulate.
#
# Each job runs independently — one job's failure doesn't block the
# others. Failing jobs file a GitHub issue (via dependency-review or
# the maintainer's review of the workflow run).

name: audit

on:
  # First Monday morning of every week, UTC. Plus on-demand.
  schedule:
    - cron: '17 8 * * 1'   # 08:17 Mon UTC — early enough that any
                            # action gets a maintainer's Monday
                            # without arriving overnight.
  workflow_dispatch: {}

  # Also re-run on changes to dependency / manifest / Blade files
  # so a PR that bumps a dep, drifts a manifest, or breaks a Blade
  # asset link doesn't slip in.
  pull_request:
    paths:
      - 'core/**'
      - 'panel/database/migrations/**'
      - 'core/Cargo.toml'
      - 'core/Cargo.lock'
      - 'core/ct-protocol/Cargo.toml'
      - 'core/ct-server-core/Cargo.toml'
      - 'panel/composer.json'
      - 'panel/composer.lock'
      - 'panel/app/**'
      - 'panel/resources/views/**'
      - 'panel/public/**'
      - 'manifests/*.json'
      - 'docker/**/Dockerfile'
      - 'docker-compose.yml'
      - 'sing-box/config.json.tpl'
      - 'caddy/Caddyfile.tpl'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a scheduled run mid-flight

jobs:

  # ---------- Cycle 31: cargo-audit (RustSec advisories) ----------

  cargo-audit:
    name: cargo audit (RustSec advisory DB)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Audit
        # `--deny warnings` so unmaintained / yanked crates also fail
        # the run, not just CVEs. Tune in deny.toml if a particular
        # advisory needs a documented exception.
        run: cargo audit --deny warnings

  # ---------- Cycle 32: cargo-deny (licenses + bans + sources) ----

  cargo-deny:
    name: cargo deny (licenses + ban list + source registry)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: Check
        # deny.toml lives at core/deny.toml.
        run: cargo deny check

  # ---------- Cycle 33: composer audit (Packagist advisories) -----

  composer-audit:
    name: composer audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Audit
        working-directory: panel
        run: |
          if [[ -f composer.lock ]]; then
              composer audit --abandoned=fail
          else
              echo "::warning::composer.lock not committed — composer audit cannot run."
              echo "::warning::Generate one with: composer install --working-dir=panel"
          fi

  # ---------- Cycle 34: secret scan (gitleaks) -------------------

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so gitleaks scans every commit
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Cycle 35: manifest drift -----------------------------
  #
  # Verify the version in every manifests/*.upstream.json that points
  # at our own crates / images matches what's actually pinned in
  # core/Cargo.toml. Catches "I bumped Cargo.toml but forgot the
  # manifest" regressions like the v0.0.6 audit found.

  manifest-drift:
    name: manifest drift (manifests/ vs Cargo.toml + Dockerfiles)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions
        run: |
          set -euo pipefail
          workspace_v=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' core/Cargo.toml)
          echo "workspace version: $workspace_v"

          for f in manifests/ct-server-core.upstream.json \
                   manifests/ct-protocol.upstream.json \
                   manifests/panel.upstream.json; do
              v=$(jq -r .version "$f")
              if [[ "$v" != "$workspace_v" ]]; then
                  echo "::error file=$f::manifest version $v does not match workspace $workspace_v"
                  exit 1
              fi
          done

          # Caddy / sing-box / mariadb / redis pins must match the FROM
          # / image: tags in the Dockerfiles + compose file.
          caddy_manifest=$(jq -r .version manifests/caddy.upstream.json)
          caddy_dockerfile=$(awk '/^FROM caddy:/ {sub(/^FROM caddy:/,""); sub(/-alpine.*$/,""); print "v"$0; exit}' docker/caddy/Dockerfile)
          if [[ "$caddy_manifest" != "$caddy_dockerfile" ]]; then
              echo "::error::caddy manifest=$caddy_manifest, Dockerfile=$caddy_dockerfile"
              exit 1
          fi

          sb_manifest=$(jq -r .version manifests/sing-box.upstream.json)
          sb_dockerfile=$(awk -F'=' '/^ARG SING_BOX_VERSION=/ {print $2; exit}' docker/sing-box/Dockerfile)
          if [[ "$sb_manifest" != "$sb_dockerfile" ]]; then
              echo "::error::sing-box manifest=$sb_manifest, Dockerfile=$sb_dockerfile"
              exit 1
          fi

          echo "manifest-drift: clean"

  # ---------- Cycle 36: dependency-review (PR-only) --------------

  dependency-review:
    name: dependency review (vuln + license diff vs base)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # ---------- Cycle 37: stale-doc grep ----------------------------

  stale-docs:
    name: stale doc references (regex blacklist)
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: grep for known-stale strings
        run: |
          set -euo pipefail
          # Strings that, if present, mean a previous-version concept
          # leaked into the current tree. Add new ones as past pivots
          # accrete.
          stale_patterns=(
              # v0.0.1 → v0.0.2: forwardproxy gone (allow in CHANGELOG / NOTICE)
              'forwardproxy@naive'
              # v0.0.3 → v0.0.4: sing-box ACME gone
              'sing-box.*built-in ACME|naive inbound.*ACME'
              # v0.0.7 → v0.0.8: backup.sh used to snapshot singbox_data
              # for ACME state; that's wrong since v0.0.4 (ACME state
              # lives in caddy_data). Catch any regression that
              # re-introduces the wrong volume name in a backup
              # context.
              'singbox_data.*ACME|ACME.*singbox_data'
              # v0.0.7 → v0.0.8: AntiTrackingFilter.php was deleted.
              # If anything outside CHANGELOG references it again,
              # somebody re-added a dead file.
              'AntiTrackingFilter'
              # v0.0.7 → v0.0.8: camouflage Blade pages used to
              # reference /static/style.css which 404s. If the link
              # comes back, the cover site fails the "looks legit"
              # smell test in scanner devtools.
              'href="/static/style\.css"'
              # v0.0.8 → v0.0.9: X-CT-Signature / X-CT-Protocol
              # response headers leaked the project name to anyone
              # hitting the subscription endpoint. v0.0.9 moved the
              # signature into the JSON body. If these strings come
              # back as ->header() calls or as outbound HTTP headers,
              # somebody re-introduced the fingerprint.
              "->header\\('X-CT-"
              # v0.0.8 → v0.0.9: NaiveProxy is HTTP/2-only at the
              # protocol level, so UDP/443 should not be mapped
              # anywhere in the stack — a UDP listen with no
              # service produces fingerprintable RSTs on QUIC scans.
              # CI catches "443:443/udp" / "443/udp" port maps in
              # any compose / Dockerfile.
              '"443:443/udp"|EXPOSE.*443/udp'
              # v0.0.5 → v0.0.6: caddyfile_safe_username calling-site
              # legacy is allowed (renaming is a v0.1 thing)
          )
          fail=0
          for pat in "${stale_patterns[@]}"; do
              # Exclude history-of-the-project files where mentions
              # are deliberate.
              if grep -rEn "$pat" \
                   --exclude-dir=.git --exclude-dir=target \
                   --exclude=CHANGELOG.md \
                   --exclude=NOTICE \
                   --exclude=THIRD_PARTY_LICENSES.md \
                   --exclude=AUDIT.md \
                   --exclude-dir=.github \
                   --include='*.md' --include='*.rs' --include='*.php' \
                   --include='*.tpl' --include='*.json' --include='*.yml' \
                   --include='*.sh' --include='*.blade.php' \
                   --include='Dockerfile*' \
                   . 2>/dev/null; then
                  echo "::error::stale reference matching /$pat/"
                  fail=1
              fi
          done
          exit "$fail"

  # ---------- Cycle 38: PHP style (Laravel Pint) ------------------
  #
  # Catches drift in PHP indentation, import ordering, declare(strict_types=1)
  # placement etc. Pint is Laravel's pre-configured wrapper around php-cs-fixer.

  php-style:
    name: php style (laravel pint --test)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: composer install (panel)
        working-directory: panel
        run: |
          composer install --no-progress --no-interaction --prefer-dist
      - name: pint --test
        working-directory: panel
        run: |
          if [[ -x vendor/bin/pint ]]; then
              vendor/bin/pint --test
          else
              echo "::warning::laravel/pint not in panel/composer.json — add it as a dev dep"
          fi

  # ---------- Cycle 39: Blade asset-link 404 check ----------------
  #
  # Catches the v0.0.7 camouflage-page bug class: <link href="/foo.css">
  # or <script src="/foo.js"> pointing at a path that has no matching
  # public file or registered route. False-negatives: dynamically
  # generated paths (asset(...), Vite::asset, request()->root() etc.).
  # Plain literal hrefs starting with / and ending in .css/.js/.svg/.png
  # are checked.

  blade-asset-links:
    name: blade asset-link 404 check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: scan blade files for broken static-asset hrefs
        run: |
          set -euo pipefail
          fail=0
          # Find <link href="/..."> and <script src="/..."> with literal
          # paths to .css/.js/.svg/.png/.ico/.webp/.woff(2). For each
          # one, verify there's a corresponding file in panel/public/.
          while IFS= read -r line; do
              file=$(cut -d: -f1 <<< "$line")
              path=$(grep -oE '(href|src)="/[A-Za-z0-9_./-]+\.(css|js|svg|png|ico|webp|woff2?)"' <<< "$line" \
                     | grep -oE '/[A-Za-z0-9_./-]+\.(css|js|svg|png|ico|webp|woff2?)' || true)
              if [[ -z "$path" ]]; then continue; fi
              if [[ ! -f "panel/public${path}" ]]; then
                  echo "::error file=$file::$path is referenced but panel/public${path} does not exist"
                  fail=1
              fi
          done < <(grep -rEn '(href|src)="/[A-Za-z0-9_./-]+\.(css|js|svg|png|ico|webp|woff2?)"' \
                       panel/resources/views 2>/dev/null || true)
          exit "$fail"

  # ---------- Cycle 43: sqlx offline metadata staleness check ----
  #
  # Catches the v0.0.10/v0.0.11 BIGINT UNSIGNED bug class at lint
  # time: every `sqlx::query!()` call now has its column types
  # frozen in core/.sqlx/*.json (see scripts/sqlx-prepare.sh).
  # If a panel migration changes a column type but nobody runs
  # `make sqlx-prepare`, the production binary will fail at
  # runtime. Instead, we validate that the committed `.sqlx/`
  # files load against the current source's `query!()` calls
  # — a stale metadata file fails this job at CI time.

  sqlx-offline-check:
    name: sqlx offline metadata up to date
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86
      - name: Verify .sqlx/ matches the workspace's query!() calls
        env:
          SQLX_OFFLINE: "true"
        run: |
          set -euo pipefail
          if [[ ! -d .sqlx ]]; then
              echo "::error::core/.sqlx/ is missing. Run 'make sqlx-prepare' on a host with the live DB and commit the result."
              exit 1
          fi
          # cargo check fails with "no cached data for query \"...\""
          # when a query!() call is not represented in .sqlx/. That
          # means either: (a) someone added a query!() without
          # running prepare; (b) someone changed a query's SQL but
          # didn't refresh; (c) a migration changed column types and
          # the existing JSON is now wrong-shaped.
          cargo check --workspace --locked --message-format=human

  # ---------- Cycle 41: PHP class-vs-filename lint (PSR-4) -------
  #
  # Catches the v0.0.10 showstopper bug class: a PHP file
  # declares `class Foo` but lives at `Bar.php`. Composer's PSR-4
  # autoloader resolves `App\Services\Bar::class` to `Bar.php`,
  # finds it, includes it — but the class declared inside is
  # `Foo`, so the symbol Bar isn't loaded. Result: every
  # `app(Bar::class)` call hits "Class not found" at runtime,
  # invisible until someone clicks the path that triggers it.
  # `composer dump-autoload --strict-psr` would catch this if
  # composer was happy with our app, so we run that too.

  php-psr4:
    name: php class-vs-filename (PSR-4 strict)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: composer install
        working-directory: panel
        run: composer install --no-progress --no-interaction --prefer-dist
      - name: composer dump-autoload --strict-psr
        working-directory: panel
        run: composer dump-autoload --strict-psr --no-scripts
      - name: grep filename != classname
        run: |
          set -euo pipefail
          fail=0
          # For every PHP file under panel/app, find the first
          # `class|interface|trait|abstract class|final class` decl
          # and check its name matches the basename. Skips files
          # without any decl (Migrations, helpers).
          while IFS= read -r f; do
              base=$(basename "$f" .php)
              decl=$(grep -E '^[[:space:]]*(abstract[[:space:]]+|final[[:space:]]+)?(class|interface|trait|enum)[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)' "$f" \
                     | head -1 \
                     | sed -E 's/.*(class|interface|trait|enum)[[:space:]]+([A-Za-z_][A-Za-z0-9_]*).*/\2/')
              if [[ -z "$decl" ]]; then continue; fi
              if [[ "$decl" != "$base" ]]; then
                  echo "::error file=$f::declares \`$decl\` but file is \`$base.php\` — PSR-4 autoloading will fail"
                  fail=1
              fi
          done < <(find panel/app -name '*.php' -type f)
          exit "$fail"

  # ---------- Cycle 42: PHPStan (undefined-method / type errors) -
  #
  # Catches the v0.0.10 second showstopper: PHP services calling
  # `$this->core->renderCaddyfile()` on a CtServerCore class
  # that has no such method. PHP only finds out at runtime
  # (a fatal Error). PHPStan does method-existence + type
  # checks at lint time. We start at level 5 — strict enough to
  # catch undefined methods + wrong-type args, lenient enough to
  # not require pervasive @phpstan annotations.

  phpstan:
    name: phpstan (level 5)
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer, phpstan
      - name: composer install
        working-directory: panel
        run: composer install --no-progress --no-interaction --prefer-dist
      - name: phpstan analyse
        working-directory: panel
        run: |
          if [[ ! -f phpstan.neon ]]; then
              # Minimal config — analyse app/, level 5, exclude
              # vendor/storage. Operators can drop in a more
              # thorough phpstan.neon later.
              cat > phpstan.neon <<'NEON'
          parameters:
              level: 5
              paths:
                  - app
              excludePaths:
                  - vendor
                  - storage
                  - bootstrap/cache
              treatPhpDocTypesAsCertain: false
          NEON
          fi
          phpstan analyse --memory-limit=512M --no-progress --error-format=github

  # ---------- Cycle 40: anti-tracking config smell-test ----------
  #
  # Static assertions on the sing-box and Caddy templates we ship.
  # These catch regressions in the on-the-wire shape that
  # NaiveProxy clients expect — TLS 1.3-only, no TCP clash API, no
  # disk cache, no recognisable hostname or string signature.
  # If a future edit weakens any of these, CI fails before the
  # change ships. Static check on the file content; we don't run
  # sing-box itself here.

  anti-tracking-config:
    name: anti-tracking config smell-test
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: assert sing-box config hardening
        run: |
          set -euo pipefail
          tpl=sing-box/config.json.tpl
          fail=0
          # min_version must be 1.3 (no TLS 1.2 fallback — modern HTTPS
          # is mostly 1.3 and a 1.2 connection stands out).
          if ! grep -qE '"min_version":\s*"1\.3"' "$tpl"; then
              echo "::error file=$tpl::tls.min_version must be \"1.3\" (anti-fingerprinting)"
              fail=1
          fi
          # log.level must be warn or higher — info logs every
          # connection, which is a forensic risk on seizure.
          if grep -qE '"log".*\{[^}]*"level":\s*"(debug|info|trace)"' "$tpl"; then
              echo "::error file=$tpl::log.level must be warn or higher (no per-connection logging)"
              fail=1
          fi
          # external_controller (TCP) is bound to 0.0.0.0:9090 inside
          # the sing-box container — intentional, used by the panel
          # over ct-net for hot reload. Required: bound to that
          # docker-internal address only (any other host:port could
          # be a misconfiguration that ends up listening publicly).
          # The host-exposure cross-check on docker-compose.yml's
          # ports: block is below.
          if ! grep -qE '"external_controller"\s*:\s*"0\.0\.0\.0:9090"' "$tpl"; then
              echo "::error file=$tpl::clash_api.external_controller must be \"0.0.0.0:9090\" (docker-internal interface)"
              fail=1
          fi
          # The bearer secret must be templated, not a static literal.
          # Static literals are a public attack surface if firewall is
          # misconfigured; the templated value comes from
          # ServerConfig::clash_secret() (see core/ct-server-core/src/
          # singbox/mod.rs).
          if ! grep -qE '"secret"\s*:\s*"\{\{\s*\.ClashSecret\s*\}\}"' "$tpl"; then
              echo "::error file=$tpl::clash_api.secret must be templated as {{ .ClashSecret }}"
              fail=1
          fi
          # cache_file should be disabled by default — DNS / connection
          # cache on disk is a forensic risk. Flatten newlines because
          # the cache_file block in the template spans multiple lines
          # and grep is line-oriented.
          if ! tr -d '\n' < "$tpl" | grep -qE '"cache_file"[[:space:]]*:[[:space:]]*\{[^}]*"enabled"[[:space:]]*:[[:space:]]*false'; then
              echo "::error file=$tpl::experimental.cache_file.enabled must be false by default"
              fail=1
          fi
          # Cross-check: the clash API listener at 0.0.0.0:9090 must
          # not be host-exposed by any service in docker-compose.yml.
          # Any list item (`- ...`) containing 9090 in a ports: or
          # similar block is a leak. The only legitimate 9090 is the
          # SINGBOX_CLASH_URL env var, which doesn't start with `-`.
          if grep -nE '^[[:space:]]+-[[:space:]]+"?[^"]*9090' docker-compose.yml; then
              echo "::error file=docker-compose.yml::clash API port 9090 must not appear in any service's ports: block"
              fail=1
          fi
          exit "$fail"
      - name: assert Caddyfile hardening
        run: |
          set -euo pipefail
          tpl=caddy/Caddyfile.tpl
          fail=0
          # The :8443 ghost site must NOT respond with a recognisable
          # string ("managed", "ok", "alive"). Empty body + 444 is the
          # contract.
          if grep -qE 'respond\s+"(managed|ok|alive|cool|tunnel|naive|sing-?box)"' "$tpl"; then
              echo "::error file=$tpl:::8443 ghost site must not respond with a recognisable string (use empty + 444)"
              fail=1
          fi
          # tls1.2 must not be in the ghost site's protocols list.
          if grep -qE 'protocols\s+tls1\.2' "$tpl"; then
              echo "::error file=$tpl::Caddy protocols list must not include tls1.2 on the ghost site"
              fail=1
          fi
          # cert_failed must NOT append to a file in /data — that's a
          # forensic trail. Log to stderr instead.
          if grep -qE 'cert_failed.*>>\s*/data' "$tpl"; then
              echo "::error file=$tpl::cert_failed event must log to stderr, not append to a file in /data"
              fail=1
          fi
          exit "$fail"
      - name: assert subscription endpoint has no project-identifying headers
        run: |
          set -euo pipefail
          fail=0
          # Custom X-CT-* response headers were a project tell on
          # /api/v1/subscription/* responses. Anything ->header()ing
          # an X-CT-* name is a regression.
          if grep -rEn "->header\\(['\"]X-CT-" panel/app 2>/dev/null; then
              echo "::error::SubscriptionController must not emit X-CT-* response headers (signature lives in JSON body)"
              fail=1
          fi
          exit "$fail"
