# SPDX-License-Identifier: AGPL-3.0-only
# Tag-triggered release orchestrator.
#
# On a `v*` tag push this creates the GitHub release as a DRAFT (hidden) and
# then drives the asset pipelines in dependency order via `workflow_call`,
# finally PUBLISHING the release (un-draft) and marking it latest only once
# EVERY asset in the release BOM (manifests/release-assets.json) is present:
#
#   create-release (draft) -> operator -> client-runtime -> image-bundle (amd64, arm64)
#                          -> finalize (require every BOM asset, then publish + mark latest)
#
# Keeping the release a draft until finalize means an incomplete release is
# never publicly visible or downloadable: a failed asset job (a missing image
# bundle, operator binary, or client runtime asset) leaves the release a draft,
# and the previous complete release stays the only public/latest one.
#
# Ordering rationale:
#   - release-operator uploads `singbox-core-*`, which the image-bundle build
#     downloads as a prebuilt input, so image bundles must run after it.
#   - the asset jobs each merge into a shared `SHA256SUMS`, so they are
#     serialized (and the two image-bundle platforms run one at a time) to
#     avoid clobbering each other.
#
# A release created with GITHUB_TOKEN does NOT emit `release: published`
# (GitHub's recursion guard), so the called workflows are invoked directly
# here rather than via the event. Their existing `release: published` and
# `workflow_dispatch` triggers are retained for manual/recovery use and do
# not double-run for token-created releases.

name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  create-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Assert package.json matches the tag
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          actual="$(jq -r .version package.json)"
          if [ "$actual" != "$version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} implies ${version}, but package.json is ${actual}"
            exit 1
          fi

      - name: Assemble release notes from CHANGELOG
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { grab = 1; next }
            grab && index($0, "## [") == 1 { grab = 0 }
            grab { print }
          ' CHANGELOG.md | sed -e 's/[[:space:]]*$//' -e '/^---$/d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf '%s\n' "Release ${GITHUB_REF_NAME}." > release-notes.md
          fi
          echo "----- release notes -----"
          cat release-notes.md

      - name: Create the release as a draft (published by finalize)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Create as a DRAFT so an incomplete release is never publicly visible
          # while assets build. The finalize job un-drafts (publishes) and marks
          # latest only once every BOM asset is present, so a PUBLISHED release
          # always carries the full asset set.
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=true --prerelease=false
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "$tag" --notes-file release-notes.md --verify-tag --draft
          fi

  operator:
    needs: create-release
    uses: ./.github/workflows/release-operator.yml
    secrets: inherit

  client-runtime:
    needs: operator
    uses: ./.github/workflows/release-client-runtime.yml
    secrets: inherit

  image-bundle:
    needs: client-runtime
    strategy:
      max-parallel: 1
      matrix:
        platform: [linux/amd64, linux/arm64]
    uses: ./.github/workflows/release-image-bundle.yml
    with:
      platform: ${{ matrix.platform }}
    secrets: inherit

  finalize:
    # Runs even if an asset leg failed, so the release is only marked latest
    # when EVERY asset in the release BOM (manifests/release-assets.json) is
    # actually present — the published assets are the source of truth, not the
    # job outcomes.
    needs: image-bundle
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Require every BOM asset, then mark latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t want < <(jq -r '.assets[]' manifests/release-assets.json)
          if [ "${#want[@]}" -eq 0 ]; then
            echo "::error::release BOM (manifests/release-assets.json) is empty"
            exit 1
          fi
          have="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          missing=()
          for pat in "${want[@]}"; do
            found=0
            while IFS= read -r a; do
              [ -n "$a" ] || continue
              # shellcheck disable=SC2053  # intentional glob match (pat may contain *)
              if [[ "$a" == $pat ]]; then found=1; break; fi
            done <<<"$have"
            [ "$found" -eq 1 ] || missing+=("$pat")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::release ${tag} is missing required asset(s) from the BOM: ${missing[*]}"
            echo "::error::not marking latest; re-run the failed asset job(s). The previous complete release stays latest."
            exit 1
          fi
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=false --latest
          echo "release ${tag} published + marked latest (all ${#want[@]} BOM assets present)"
