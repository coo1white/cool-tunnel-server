# SPDX-License-Identifier: AGPL-3.0-only
# LTSC CI gate.
#
# Runs on every push and pull-request. Replicates exactly what
# `make ci` runs locally so a green CI badge means a release-able
# tree.
#
# We deliberately do NOT build Docker images in CI — that is left
# to the release pipeline (RELEASE.md). CI's job is fast feedback;
# image builds are a separate per-tag concern.
#
# Tag pushes do NOT re-trigger ci: tags are created on a commit
# that already passed ci on main (per RELEASE.md), so the re-run
# is pure duplication. The 2026-05-15 release of v0.1.8/9/10 cut
# three tags in quick succession and the resulting 3× ci re-runs
# saturated the GitHub-hosted runner queue, starving the
# `ct-operator release` workflows of slots and timing them out
# at the ~23-minute mark with zero steps run. `tag-version-check`
# (the per-tag manifest assertion) stays on tag-push because
# its whole purpose is to catch tags that diverge from the
# panel/config/cool-tunnel.php version string.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Don't run a stale workflow if a newer commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (build / test / clippy / fmt)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - name: Pinned Rust toolchain (matches rust-toolchain.toml)
        # core/rust-toolchain.toml::channel was bumped 1.86 → 1.88 in
        # v0.0.50 to unblock cargo-chef's transitive MSRV. The pin
        # below must move in lockstep, otherwise CI builds against
        # the older toolchain while local + production builds use
        # 1.88, masking real compatibility issues.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          components: clippy, rustfmt

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/Cargo.lock') }}

      # Compile-time SQL safety. SQLX_OFFLINE=true tells the
      # `sqlx::query!()` macros to read core/.sqlx/*.json
      # (committed) instead of trying to open a live MariaDB.
      # A schema regression (column dropped / retyped / renamed)
      # that wasn't reflected in .sqlx/ fails the build here with
      # "no cached data for query"; the operator regenerates with
      # `make sqlx-prepare` and commits.
      - run: cargo fmt --all -- --check
      - run: cargo build --release --workspace --locked
        env:
          SQLX_OFFLINE: "true"
      - run: cargo test  --release --workspace --locked
        env:
          SQLX_OFFLINE: "true"
      # `-D warnings` was dropped here in v0.0.56 (after v0.0.55's
      # local Makefile change). The workspace's [lints.clippy] table
      # already declares unwrap_used / expect_used / panic / todo /
      # unimplemented as deny — those are the real correctness
      # gates and they fail compilation regardless of cmdline flags.
      # `-D warnings` was promoting the entire `pedantic` lint group
      # (warn-level by config) to errors, which generated 80+
      # false-positive failures across pre-existing code
      # (doc_markdown, cast_possible_truncation, missing #[must_use]
      # on pure helpers, etc.). Cleaning that up is a Cycle-N
      # follow-up; the relaxation keeps real correctness gating
      # intact via the deny rules.
      - run: cargo clippy --release --all-targets --locked
        env:
          SQLX_OFFLINE: "true"

  php:
    name: php (syntax / composer validate)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: PHP syntax pass on every panel/**/*.php
        working-directory: panel
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
              if ! php -l "$f" >/dev/null 2>&1; then
                  echo "::error file=panel/$f::syntax error"
                  php -l "$f" || true
                  fail=1
              fi
          done < <(find app database/migrations database/seeders config bootstrap routes \
                    -name '*.php' -type f -print0)
          exit "$fail"

      - name: composer validate
        working-directory: panel
        run: composer validate composer.json --strict --no-check-publish

      # Run the panel's PHPUnit suite (v0.0.19 added the scaffold;
      # v0.0.20 wires it into CI). `--no-scripts` matches the
      # supply-chain hardening pattern from v0.0.16's entrypoint.sh
      # — a transitive composer package's post-install hook can't
      # execute as the runner UID and reach the test secrets / build
      # cache.
      - name: composer install (panel test deps)
        working-directory: panel
        run: |
          # --ignore-platform-req=ext-redis: the CI runner has
          # ext-redis 5.3.0 (default for the GitHub-hosted PHP
          # 8.4 image), but symfony/redis-messenger v7.4.8
          # requires ext-redis >= 6.1. Production has the right
          # version via the panel Dockerfile's PECL install; CI
          # never RUNS the Redis transport (phpunit uses
          # MessengerServiceProvider's InMemoryTransport in the
          # testing env), so this is safe.
          # (v0.0.93 Symfony-Messenger-foundation PR.)
          composer install \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --no-scripts \
              --ignore-platform-req=ext-redis
          php artisan package:discover --ansi

      - name: phpunit (panel)
        working-directory: panel
        run: vendor/bin/phpunit --colors=never

  shell:
    name: shell (shellcheck)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./scripts
          additional_files: docker/panel/entrypoint.sh

  operator:
    name: operator (ct-operator typecheck + test)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  manifests:
    name: manifests (jq parse)
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          for f in manifests/*.json; do
              jq . "$f" > /dev/null \
                || { echo "::error file=$f::invalid JSON"; exit 1; }
          done

  template:
    name: templates (substitute + caddy/sing-box config syntax)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Render and validate the Caddyfile
        run: |
          set -euo pipefail
          rendered=$(mktemp)
          # PanelDomain binding added in v0.0.33 (R1-1 / R1-2 SNI
          # router). Without this sed line the rendered file keeps
          # the literal `{{ .PanelDomain }}` token, which Caddy's
          # validator rejects as "Site addresses cannot end with
          # curly brace '{{'". Pre-v0.0.56 CI was broken on this.
          sed -e 's|{{ \.Domain }}|test.local|g' \
              -e 's|{{ \.PanelDomain }}|panel.test.local|g' \
              -e 's|{{ \.AcmeEmail }}|t@x.com|g' \
              -e 's|{{ \.AcmeDirectory }}|https://acme-staging-v02.api.letsencrypt.org/directory|g' \
              caddy/Caddyfile.tpl > "$rendered"
          docker run --rm -v "$rendered":/etc/caddy/Caddyfile caddy:2.8.4-alpine \
              caddy validate --config /etc/caddy/Caddyfile

      # Render and validate sing-box config against the EXACT
      # binary version pinned in manifests/sing-box.upstream.json.
      # This is the poka-yoke for the v0.0.11 deploy bug:
      #
      #   FATAL: route.default_domain_resolver: json: unknown
      #          field "default_domain_resolver"
      #
      # …caused by adding a 1.11+ field to a 1.10.7-pinned
      # template. With this CI step, the same change would have
      # failed at PR time instead of during a live operator
      # deploy.
      - name: Render and validate sing-box config
        run: |
          set -euo pipefail
          rendered=$(mktemp)
          # Substitute every Go-template binding with a plausible
          # sample value. UsersJson must be a valid JSON array
          # (sing-box parses it as the `users` array's structure
          # — empty `[]` may be rejected, so we use a one-user
          # sample that lints clean).
          #
          # Bindings added since this CI step's last sweep:
          #   {{ .DohServer }}  + {{ .DohPath }}  — sing-box 1.12+
          #     replaced the single dns.servers[].address field
          #     with separate type / server / path. Renderer
          #     splits DohResolver at split_doh_url(); both
          #     components need substitution here.
          #   {{ .ClashListen }} — v0.0.13 H3 anti-fingerprint fix.
          #     The renderer fills it from CT_CLASH_LISTEN; for
          #     CI a plausible value matching the docker-compose
          #     default is fine.
          # Adding the new bindings is a v0.0.20 fix — pre-fix the
          # rendered config kept the literal `{{ .ClashListen }}`
          # string as the external_controller value, which sing-box
          # validation parsed as a string (passed) but did NOT
          # exercise the binding's actual format constraints. Now
          # CI tests against the real shape ct-server-core renders.
          sed -e 's|{{ \.Domain }}|test.example.com|g' \
              -e 's|{{ \.CertPath }}|/tmp/cert.pem|g' \
              -e 's|{{ \.KeyPath }}|/tmp/key.pem|g' \
              -e 's|{{ \.DohResolver }}|https://1.1.1.1/dns-query|g' \
              -e 's|{{ \.DohServer }}|1.1.1.1|g' \
              -e 's|{{ \.DohPath }}|/dns-query|g' \
              -e 's|{{ \.ClashSecret }}|test-clash-secret|g' \
              -e 's|{{ \.ClashListen }}|172.30.0.10:9090|g' \
              -e 's|{{ \.UsersJson }}|[{"username":"sample","password":"x"}]|g' \
              sing-box/config.json.tpl > "$rendered"

          # Pull the EXACT version from the manifest so this stays
          # in sync. If the operator bumps the manifest, the CI
          # validation upgrades too.
          version=$(jq -r .version manifests/sing-box.upstream.json | sed 's/^v//')
          echo "validating against sing-box ${version}"

          # Generate a real (self-signed, throwaway) PEM cert + key.
          # Pre-v0.0.56 this step `: > /tmp/cert.pem` empty-touched the
          # files based on a documented assumption that sing-box's
          # `check` command parses-only without actually loading TLS.
          # That stopped being true at some point — current sing-box
          # `check` runs the full inbound init, including
          # x509.LoadX509KeyPair, which fails on empty files with:
          #   FATAL initialize inbound[0]: parse x509 key pair:
          #     tls: failed to find any PEM data in certificate input
          # A 1-day self-signed cert satisfies the parser without
          # needing a CA — sing-box only validates PEM shape at
          # check-time, not validity dates / chain.
          openssl req -x509 -nodes -newkey rsa:2048 \
              -keyout /tmp/key.pem -out /tmp/cert.pem \
              -days 1 -subj '/CN=test.example.com' >/dev/null 2>&1
          docker run --rm \
              -v "$rendered":/etc/sing-box/config.json:ro \
              -v /tmp/cert.pem:/tmp/cert.pem:ro \
              -v /tmp/key.pem:/tmp/key.pem:ro \
              ghcr.io/sagernet/sing-box:v${version} \
              check -c /etc/sing-box/config.json
