# SPDX-License-Identifier: AGPL-3.0-only
# LTSC CI gate.
#
# Runs on every push and pull-request. Replicates exactly what
# `make ci` runs locally so a green CI badge means a release-able
# tree.
#
# We deliberately do NOT build Docker images in CI — that is left
# to the release pipeline (RELEASE.md). CI's job is fast feedback;
# image builds are a separate per-tag concern.
#
# Tag pushes do NOT re-trigger ci: tags are created on a commit
# that already passed ci on main (per RELEASE.md), so the re-run
# is pure duplication. The 2026-05-15 release of v0.1.8/9/10 cut
# three tags in quick succession and the resulting 3× ci re-runs
# saturated the GitHub-hosted runner queue, starving the
# `ct-operator release` workflows of slots and timing them out
# at the ~23-minute mark with zero steps run. `tag-version-check`
# (the per-tag manifest assertion) stays on tag-push because
# its whole purpose is to catch tags that diverge from the
# root package.json version string.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Don't run a stale workflow if a newer commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  utf8:
    name: utf8 (project text / runtime contract)
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - run: ./scripts/check-utf8.sh
      - name: Compose runtime UTF-8 locale contract
        run: |
          grep -q '^x-utf8-env:' docker-compose.yml
          grep -q 'LANG: C.UTF-8' docker-compose.yml
          grep -q 'LC_ALL: C.UTF-8' docker-compose.yml

  rust:
    name: rust (build / test / clippy / fmt)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Pinned Rust toolchain (matches rust-toolchain.toml)
        # The pin below must move in lockstep with
        # core/rust-toolchain.toml::channel, otherwise CI builds
        # against a different toolchain than the one clients use when
        # they fetch and build the published ct-protocol crate.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          components: clippy, rustfmt

      - name: Cache Cargo registry + target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/Cargo.lock') }}

      # Guards the published ct-protocol crate — the cross-platform
      # shared wire/profile/subscription types every client fetches
      # from the server's release tag. The workspace [lints.clippy]
      # table denies unwrap_used / expect_used / panic / todo /
      # unimplemented, which are the real correctness gates.
      - run: cargo fmt --all -- --check
      - run: cargo build --release --workspace --locked
      - run: cargo test  --release --workspace --locked
      - run: cargo clippy --release --all-targets --locked

  web-api:
    name: admin monorepo (typecheck / test / build)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-bun-pnpm
      - run: pnpm run typecheck
      - run: bun test apps/api/tests apps/web/tests packages/db/tests packages/security/tests packages/config/tests
      - run: pnpm run build

  lint:
    name: lint (biome — format + lint across the monorepo)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-bun-pnpm
      - name: biome check
        run: pnpm run lint

  shell:
    name: shell (shellcheck)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          scandir: ./scripts

  operator:
    name: operator (ct-operator typecheck + test)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-bun-pnpm
      - run: cd operator && bun run typecheck
      - run: cd operator && bun test

  singbox-core:
    name: singbox-core (typecheck + test)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-bun-pnpm
      - run: cd singbox-core && bun run typecheck
      - run: cd singbox-core && bun test

  manifests:
    name: manifests (jq parse + release metadata)
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - run: |
          set -euo pipefail
          for f in manifests/*.json; do
              jq . "$f" > /dev/null \
                || { echo "::error file=$f::invalid JSON"; exit 1; }
          done
          root_v=$(jq -r .version package.json)
          for f in manifests/admin-api.upstream.json manifests/admin-web.upstream.json manifests/client-runtime.upstream.json; do
              v=$(jq -r .version "$f")
              if [[ "$v" != "$root_v" ]]; then
                  echo "::error file=$f::manifest version $v does not match package.json $root_v"
                  exit 1
              fi
          done

  template:
    name: templates (substitute + caddy config syntax)
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # v0.3.0: validate the Caddyfile against the SAME custom Caddy
      # image we ship (xcaddy + mholt/caddy-l4). Stock
      # `caddy:2.11.3-alpine` rejects the `layer4` directive because
      # the plugin isn't compiled in.
      #
      # The build is cached by docker's layer cache in CI runners;
      # a no-change rerun completes in ~30s.
      - name: Build custom Caddy image
        run: |
          set -euxo pipefail
          docker build -t ct-caddy-test docker/caddy
          docker run --rm ct-caddy-test caddy version
          # Capture the full module list to a file so a failed
          # assertion below can dump it — the previous `grep -q`
          # form gave no postmortem signal (layer4 either present
          # or "absent", with no way to see what WAS loaded). The
          # in-Dockerfile RUN already asserts layer4 at build time;
          # this CI-level re-assertion guards against BuildKit
          # cache anomalies and upstream `caddy:2.11.3-alpine`
          # base-image drift, both of which have no fingerprint
          # in the build log without the dump-on-fail.
          modules=$(mktemp)
          docker run --rm ct-caddy-test caddy list-modules > "$modules"
          if ! grep -q '^layer4$' "$modules"; then
              echo "::group::caddy list-modules (full)"
              cat "$modules"
              echo "::endgroup::"
              echo "::error::layer4 module did not load into custom Caddy (see grouped log above for the actual module list)"
              exit 1
          fi

      - name: Render and validate the Caddyfile
        run: |
          set -euo pipefail
          rendered=$(mktemp)
          # Substitute every binding the v0.4.0 renderer emits. The
          # Caddyfile shrinks to a layer4 SNI splitter (PANEL_DOMAIN
          # SNI → inner :8443, everything else → tcp/ct-singbox:443)
          # plus the inner Caddy :8443 admin reverse-proxy. No more
          # cert-acquisition stub or proxy-domain ACME — Reality
          # replaces ACME on the proxy path; per-account credentials
          # live in /data/config/singbox.json (singbox-core render-
          # server's output, file-watched by ct-singbox's supervisor).
          sed -e 's|{{ \.Domain }}|test.local|g' \
              -e 's|{{ \.PanelDomain }}|panel.test.local|g' \
              -e 's|{{ \.AcmeEmail }}|t@x.com|g' \
              -e 's|{{ \.AcmeDirectory }}|https://acme-staging-v02.api.letsencrypt.org/directory|g' \
              caddy/Caddyfile.tpl > "$rendered"
          docker run --rm -v "$rendered":/etc/caddy/Caddyfile ct-caddy-test \
              caddy validate --config /etc/caddy/Caddyfile
