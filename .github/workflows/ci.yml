# SPDX-License-Identifier: AGPL-3.0-only
# LTSC CI gate.
#
# Runs on every push and pull-request. Replicates exactly what
# `make ci` runs locally so a green CI badge means a release-able
# tree.
#
# We deliberately do NOT build Docker images in CI — that is left
# to the release pipeline (RELEASE.md). CI's job is fast feedback;
# image builds are a separate per-tag concern.
#
# Tag pushes do NOT re-trigger ci: tags are created on a commit
# that already passed ci on main (per RELEASE.md), so the re-run
# is pure duplication. The 2026-05-15 release of v0.1.8/9/10 cut
# three tags in quick succession and the resulting 3× ci re-runs
# saturated the GitHub-hosted runner queue, starving the
# `ct-operator release` workflows of slots and timing them out
# at the ~23-minute mark with zero steps run. `tag-version-check`
# (the per-tag manifest assertion) stays on tag-push because
# its whole purpose is to catch tags that diverge from the
# panel/config/cool-tunnel.php version string.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Don't run a stale workflow if a newer commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  utf8:
    name: utf8 (project text / runtime contract)
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-utf8.sh
      - name: Compose runtime UTF-8 locale contract
        run: |
          grep -q '^x-utf8-env:' docker-compose.yml
          grep -q 'LANG: C.UTF-8' docker-compose.yml
          grep -q 'LC_ALL: C.UTF-8' docker-compose.yml

  rust:
    name: rust (build / test / clippy / fmt)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - name: Pinned Rust toolchain (matches rust-toolchain.toml)
        # core/rust-toolchain.toml::channel was bumped 1.86 → 1.88 in
        # v0.0.50 to unblock cargo-chef's transitive MSRV. The pin
        # below must move in lockstep, otherwise CI builds against
        # the older toolchain while local + production builds use
        # 1.88, masking real compatibility issues.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          components: clippy, rustfmt

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/Cargo.lock') }}

      # Compile-time SQL safety. SQLX_OFFLINE=true tells the
      # `sqlx::query!()` macros to read core/.sqlx/*.json
      # (committed) instead of trying to open a live MariaDB.
      # A schema regression (column dropped / retyped / renamed)
      # that wasn't reflected in .sqlx/ fails the build here with
      # "no cached data for query"; the operator regenerates with
      # `make sqlx-prepare` and commits.
      - run: cargo fmt --all -- --check
      - run: cargo build --release --workspace --locked
        env:
          SQLX_OFFLINE: "true"
      - run: cargo test  --release --workspace --locked
        env:
          SQLX_OFFLINE: "true"
      # `-D warnings` was dropped here in v0.0.56 (after v0.0.55's
      # local Makefile change). The workspace's [lints.clippy] table
      # already declares unwrap_used / expect_used / panic / todo /
      # unimplemented as deny — those are the real correctness
      # gates and they fail compilation regardless of cmdline flags.
      # `-D warnings` was promoting the entire `pedantic` lint group
      # (warn-level by config) to errors, which generated 80+
      # false-positive failures across pre-existing code
      # (doc_markdown, cast_possible_truncation, missing #[must_use]
      # on pure helpers, etc.). Cleaning that up is a Cycle-N
      # follow-up; the relaxation keeps real correctness gating
      # intact via the deny rules.
      - run: cargo clippy --release --all-targets --locked
        env:
          SQLX_OFFLINE: "true"

  php:
    name: php (syntax / composer validate)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: PHP syntax pass on every panel/**/*.php
        working-directory: panel
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
              if ! php -l "$f" >/dev/null 2>&1; then
                  echo "::error file=panel/$f::syntax error"
                  php -l "$f" || true
                  fail=1
              fi
          done < <(find app database/migrations database/seeders config bootstrap routes \
                    -name '*.php' -type f -print0)
          exit "$fail"

      - name: PHP runtime UTF-8 defaults
        working-directory: panel
        run: |
          test "$(php -r 'echo ini_get("default_charset");')" = "UTF-8"
          test "$(php -r 'echo mb_internal_encoding();')" = "UTF-8"

      - name: composer validate
        working-directory: panel
        run: composer validate composer.json --strict --no-check-publish

      # Run the panel's PHPUnit suite (v0.0.19 added the scaffold;
      # v0.0.20 wires it into CI). `--no-scripts` matches the
      # supply-chain hardening pattern from v0.0.16's entrypoint.sh
      # — a transitive composer package's post-install hook can't
      # execute as the runner UID and reach the test secrets / build
      # cache.
      - name: composer install (panel test deps)
        working-directory: panel
        run: |
          # --ignore-platform-req=ext-redis: the CI runner has
          # ext-redis 5.3.0 (default for the GitHub-hosted PHP
          # 8.4 image), but symfony/redis-messenger v7.4.8
          # requires ext-redis >= 6.1. Production has the right
          # version via the panel Dockerfile's PECL install; CI
          # never RUNS the Redis transport (phpunit uses
          # MessengerServiceProvider's InMemoryTransport in the
          # testing env), so this is safe.
          # (v0.0.93 Symfony-Messenger-foundation PR.)
          composer install \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --no-scripts \
              --ignore-platform-req=ext-redis
          php artisan package:discover --ansi

      - name: phpunit (panel)
        working-directory: panel
        run: vendor/bin/phpunit --colors=never

  shell:
    name: shell (shellcheck)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./scripts
          additional_files: docker/panel/entrypoint.sh

  operator:
    name: operator (ct-operator typecheck + test)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  singbox-core:
    name: singbox-core (typecheck + test)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: singbox-core
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  manifests:
    name: manifests (jq parse)
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          for f in manifests/*.json; do
              jq . "$f" > /dev/null \
                || { echo "::error file=$f::invalid JSON"; exit 1; }
          done

  template:
    name: templates (substitute + caddy config syntax)
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      # v0.3.0: validate the Caddyfile against the SAME custom Caddy
      # image we ship (xcaddy + mholt/caddy-l4). Stock
      # `caddy:2.11.3-alpine` rejects the `layer4` directive because
      # the plugin isn't compiled in.
      #
      # The build is cached by docker's layer cache in CI runners;
      # a no-change rerun completes in ~30s.
      - name: Build custom Caddy image
        run: |
          set -euxo pipefail
          docker build -t ct-caddy-test docker/caddy
          docker run --rm ct-caddy-test caddy version
          # Capture the full module list to a file so a failed
          # assertion below can dump it — the previous `grep -q`
          # form gave no postmortem signal (layer4 either present
          # or "absent", with no way to see what WAS loaded). The
          # in-Dockerfile RUN already asserts layer4 at build time;
          # this CI-level re-assertion guards against BuildKit
          # cache anomalies and upstream `caddy:2.11.3-alpine`
          # base-image drift, both of which have no fingerprint
          # in the build log without the dump-on-fail.
          modules=$(mktemp)
          docker run --rm ct-caddy-test caddy list-modules > "$modules"
          if ! grep -q '^layer4$' "$modules"; then
              echo "::group::caddy list-modules (full)"
              cat "$modules"
              echo "::endgroup::"
              echo "::error::layer4 module did not load into custom Caddy (see grouped log above for the actual module list)"
              exit 1
          fi

      - name: Render and validate the Caddyfile
        run: |
          set -euo pipefail
          rendered=$(mktemp)
          # Substitute every binding the v0.4.0 renderer emits. The
          # Caddyfile shrinks to a layer4 SNI splitter (panel.* SNI →
          # inner :8443, everything else → tcp/ct-singbox:443) plus
          # the inner Caddy :8443 panel reverse-proxy. No more
          # cert-acquisition stub or proxy-domain ACME — Reality
          # replaces ACME on the proxy path; per-account credentials
          # live in /data/config/singbox.json (singbox-core render-
          # server's output, file-watched by ct-singbox's supervisor).
          sed -e 's|{{ \.Domain }}|test.local|g' \
              -e 's|{{ \.PanelDomain }}|panel.test.local|g' \
              -e 's|{{ \.AcmeEmail }}|t@x.com|g' \
              -e 's|{{ \.AcmeDirectory }}|https://acme-staging-v02.api.letsencrypt.org/directory|g' \
              caddy/Caddyfile.tpl > "$rendered"
          docker run --rm -v "$rendered":/etc/caddy/Caddyfile ct-caddy-test \
              caddy validate --config /etc/caddy/Caddyfile
