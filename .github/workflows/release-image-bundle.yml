# SPDX-License-Identifier: AGPL-3.0-only
# Release Docker image bundle builder.
#
# This is intentionally separate from CI and from the operator binary
# workflow: image bundles are large, slow, and only needed when a release
# asset must be produced or repaired.

name: release image bundle

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Image platform to build"
        required: true
        default: "linux/amd64"
        type: choice
        options:
          - linux/amd64
          - linux/arm64

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ${{ inputs.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Fetch prebuilt core inputs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'ct-server-core-linux-*' \
            --pattern 'singbox-core-linux-*' \
            --dir release-assets \
            --clobber
          chmod +x release-assets/ct-server-core-linux-* release-assets/singbox-core-linux-*

      - name: Build image bundle assets
        run: |
          set -euo pipefail
          case "${{ inputs.platform }}" in
            linux/amd64) suffix=linux-x64 ;;
            linux/arm64) suffix=linux-arm64 ;;
            *) echo "unsupported platform: ${{ inputs.platform }}" >&2; exit 2 ;;
          esac
          echo "suffix=$suffix" >> "$GITHUB_ENV"
          PLATFORMS="${{ inputs.platform }}" \
            ./scripts/build_release_image_bundle.sh

      - name: Upload image assets to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          suffix="${suffix}"
          gh release upload "$tag" \
            release-assets/cool-tunnel-server-images-${suffix}.bom.json \
            release-assets/cool-tunnel-server-image-${suffix}-*.tar.gz \
            release-assets/cool-tunnel-server-image-${suffix}-*.tar.gz.part-* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Merge image checksums into release SHA256SUMS
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-assets/checksums
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern SHA256SUMS \
            --dir release-assets/checksums \
            --clobber || true
          if [ -s release-assets/checksums/SHA256SUMS ]; then
            cat release-assets/SHA256SUMS.images release-assets/checksums/SHA256SUMS \
              | awk 'NF && !seen[$2]++' \
              > release-assets/SHA256SUMS
          else
            cp release-assets/SHA256SUMS.images release-assets/SHA256SUMS
          fi
          gh release upload "${GITHUB_REF_NAME}" release-assets/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Upload workflow artifact copy
        uses: actions/upload-artifact@v4
        with:
          name: image-bundle-${{ env.suffix }}
          path: |
            release-assets/cool-tunnel-server-images-${{ env.suffix }}.bom.json
            release-assets/cool-tunnel-server-image-${{ env.suffix }}-*.tar.gz
            release-assets/cool-tunnel-server-image-${{ env.suffix }}-*.tar.gz.part-*
            release-assets/SHA256SUMS.images
          retention-days: 14
