name: client runtime release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-client-runtime:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build client Rust core from server-paired source
        run: |
          mkdir -p "$GITHUB_WORKSPACE/runtime"
          CORE_REF="${CORE_REF:-$(jq -r '.plugins["cool-tunnel-core"].source.ref' manifests/client-runtime.upstream.json)}"
          git clone --depth 1 --branch "$CORE_REF" https://github.com/coo1white/cool-tunnel.git /tmp/cool-tunnel-client
          cd /tmp/cool-tunnel-client/core
          cargo build --locked --release --target aarch64-apple-darwin --bin cool-tunnel-core
          cargo build --locked --release --target x86_64-apple-darwin --bin cool-tunnel-core
          lipo -create \
            target/aarch64-apple-darwin/release/cool-tunnel-core \
            target/x86_64-apple-darwin/release/cool-tunnel-core \
            -output "$GITHUB_WORKSPACE/runtime/cool-tunnel-core-v3.0.6-universal"
          codesign --force --sign - --timestamp=none "$GITHUB_WORKSPACE/runtime/cool-tunnel-core-v3.0.6-universal"

      - name: Build server-published sing-box universal plugin
        run: |
          mkdir -p runtime
          ARM_URL=$(jq -r '.assets["darwin-arm64"].url' singbox-core/singbox.upstream.json)
          X64_URL=$(jq -r '.assets["darwin-amd64"].url' singbox-core/singbox.upstream.json)
          curl -fLs --retry 3 -o runtime/sing-box-arm64.tar.gz "$ARM_URL"
          curl -fLs --retry 3 -o runtime/sing-box-x64.tar.gz "$X64_URL"
          mkdir -p runtime/arm64 runtime/x64
          tar -xzf runtime/sing-box-arm64.tar.gz -C runtime/arm64 --strip-components=1
          tar -xzf runtime/sing-box-x64.tar.gz -C runtime/x64 --strip-components=1
          TAG=$(jq -r '.upstream_tag' singbox-core/singbox.upstream.json)
          lipo -create runtime/arm64/sing-box runtime/x64/sing-box -output "runtime/sing-box-${TAG}-darwin-universal"
          codesign --force --sign - --timestamp=none "runtime/sing-box-${TAG}-darwin-universal"
          rm -rf runtime/arm64 runtime/x64 runtime/sing-box-arm64.tar.gz runtime/sing-box-x64.tar.gz

      - name: Stage runtime artifacts
        run: |
          shasum -a 256 \
            runtime/sing-box-*-darwin-universal \
            runtime/cool-tunnel-core-*-universal \
            > runtime/SHA256SUMS.client-runtime
          cat runtime/SHA256SUMS.client-runtime

      - name: Upload runtime plugins to server release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            runtime/sing-box-*-darwin-universal
            runtime/cool-tunnel-core-*-universal
            runtime/SHA256SUMS.client-runtime
