# SPDX-License-Identifier: AGPL-3.0-only
# ct-operator release pipeline.
#
# Builds the operator/ Bun CLI for every supported target, generates
# SHA256SUMS for the binaries, and uploads everything to the GitHub
# release matching the tag the workflow was invoked on.
#
# Upload routing is by ref, not by event:
#   - ref is a tag (`refs/tags/v*`)  → attach to the existing release
#                                       at that tag. This is the path
#                                       for `release: published` AND
#                                       for `workflow_dispatch --ref
#                                       vX.Y.Z` (the recovery flow
#                                       used 2026-05-15 after GitHub-
#                                       hosted runner-queue starvation
#                                       failed the original three
#                                       release runs).
#   - ref is NOT a tag (e.g. main)   → publish a 14-day workflow
#                                       artifact instead. Useful when
#                                       smoke-testing pipeline changes
#                                       on a branch.

name: ct-operator release

on:
  release:
    types: [published]
  workflow_call:
  workflow_dispatch:
    inputs:
      scope:
        description: "Assets to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - operator-only

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: ./.github/actions/setup-bun-pnpm
        with:
          install: 'false'

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3
        if: ${{ github.event.inputs.scope != 'operator-only' }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
        if: ${{ github.event.inputs.scope != 'operator-only' }}

      - name: Build all targets
        run: |
          pnpm install --frozen-lockfile
          cd operator
          bun run build.ts all
          ls -lh bin/

      - name: Build prebuilt singbox-core assets
        if: ${{ github.event.inputs.scope != 'operator-only' }}
        run: |
          mkdir -p operator/bin
          ./scripts/build_release_singbox_core_assets.sh
          cp release-assets/singbox-core-linux-* operator/bin/
          chmod +x operator/bin/singbox-core-linux-*
          ls -lh operator/bin/singbox-core-linux-*

      - name: Generate SHA256SUMS
        working-directory: operator/bin
        run: |
          sha256sum ct-operator-* > SHA256SUMS.generated
          if [ "${{ github.event.inputs.scope }}" != "operator-only" ]; then
            sha256sum singbox-core-* >> SHA256SUMS.generated
          fi
          cp SHA256SUMS.generated SHA256SUMS
          cat SHA256SUMS

      - name: Merge existing release checksums
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p operator/bin/checksums
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern SHA256SUMS \
            --dir operator/bin/checksums \
            --clobber || true
          if [ -s operator/bin/checksums/SHA256SUMS ]; then
            cat operator/bin/SHA256SUMS.generated operator/bin/checksums/SHA256SUMS \
              | awk 'NF && !seen[$2]++' \
              > operator/bin/SHA256SUMS
          fi
          cat operator/bin/SHA256SUMS

      - name: Attest release binaries
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: operator/bin/ct-operator-*

      - name: Attest core release binaries
        if: ${{ github.event.inputs.scope != 'operator-only' }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: |
            operator/bin/singbox-core-*

      - name: Upload artifacts to release (tag ref)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            operator/bin/ct-operator-*
            operator/bin/SHA256SUMS

      - name: Upload core artifacts to release (tag ref)
        if: ${{ startsWith(github.ref, 'refs/tags/') && github.event.inputs.scope != 'operator-only' }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            operator/bin/singbox-core-*

      - name: Upload artifacts (non-tag ref — workflow artifact)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ct-operator-release
          path: |
            operator/bin/ct-operator-*
            operator/bin/SHA256SUMS
          retention-days: 14
