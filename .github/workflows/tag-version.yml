# SPDX-License-Identifier: AGPL-3.0-only
# Tag/source version-sync gate.
#
# Fires ONLY on tag pushes matching `v*`. Strips the leading `v`
# from the tag (v0.5.3 -> 0.5.3) and asserts the monorepo source-
# of-record version in package.json matches. The v0.5.2 rebuild retired the
# PHP admin runtime, so package.json is the active Better-T-Stack
# release source for apps/web, apps/api, and packages/*.
#
# Scope: package.json only. Manifest drift is checked in ci/audit.

name: tag-version-check

on:
  push:
    tags: ['v*']

# A tag ref is immutable, but a re-pushed tag (force) would queue
# a second run; cancel the older one so only the latest assertion
# is live.
concurrency:
  group: tag-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-version-matches-tag:
    name: package.json matches tag
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Assert package version equals tag version
        run: |
          set -euo pipefail

          # github.ref_name on a tag push is the bare tag ("v0.0.61");
          # strip exactly one leading "v" — pre-release suffixes
          # ("v0.0.62-rc1" → "0.0.62-rc1") pass through unchanged
          # and must still match whatever the source records.
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          file="package.json"

          if [ ! -f "$file" ]; then
            echo "::error file=${file}::expected file does not exist at tag ${tag}"
            exit 1
          fi

          actual="$(jq -r .version "$file")"
          if [[ "$actual" != "$version" ]]; then
            echo "::error file=${file}::tag ${tag} implies version ${version}, but ${file} does not declare it."
            echo "actual package.json version: ${actual}"
            echo "--- fix ---"
            echo "Run \`make set-version V=${version}\` locally, commit, retag."
            exit 1
          fi

          echo "OK: tag ${tag} matches ${file} (version=${version})"
